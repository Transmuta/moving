# Fly.io — app do web BFF (SvelteKit + adapter-node). Deploy a partir de web/:  fly deploy
# Ajuste `app`, `primary_region` e os hostnames conforme sua conta. Ver docs/17-deploy-fly.md.

app = "movimento-web"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile.prod"

[env]
  PORT = "3000"
  # BFF → API pela rede privada 6PN do Fly (não passa pela edge, fica http interno).
  API_URL = "http://movimento-api.internal:4000"
  # OAuth redirect do Google / WebSocket: são navegações reais do browser → API pública.
  API_PUBLIC_ORIGIN = "https://movimento-api.fly.dev"
  # adapter-node: origem para a checagem de CSRF (forms, ex. sign-out) e URLs absolutas.
  ORIGIN = "https://movimento-web.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
