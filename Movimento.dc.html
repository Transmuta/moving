      body=html`<div style=${{textAlign:'center',padding:'8px 8px 4px'}}>
        <div style=${{fontSize:'13px',fontWeight:600,color:c.muted}}>Sem pacote ativo</div>
        <div style=${{fontSize:'12px',color:c.faint,margin:'2px 0 12px'}}>Pacotes anteriores estão no histórico abaixo.</div>
        <button onClick=${()=>this.openAgendarPacote(p.id)} style=${{display:'inline-flex',alignItems:'center',gap:'7px',padding:'8px 15px',borderRadius:'9px',border:'none',background:c.primary,color:c.onPrimary,fontWeight:600,cursor:'pointer',fontSize:'12.5px'}}><${Icon} name="Plus" size=${14}/> Agendar pacote</button>

      <button onClick=${()=>this.setState({pkgHistOpen:!histOpen})} style=${{display:'flex',alignItems:'center',gap:'8px',width:'100%',padding:'8px 2px',background:'none',border:'none',cursor:'pointer',color:c.muted}}>
        <${Icon} name="ChevronDown" size=${16} color=${c.faint} style=${{transform:histOpen?'none':'rotate(-90deg)',transition:'transform .15s'}}/>
        <span style=${{fontSize:'12.5px',fontWeight:700,flex:1,textAlign:'left'}}>Histórico</span>
        <span style=${{fontFamily:"'Martian Mono', monospace",fontSize:'11px',color:c.faint}}>${hist.length}</span>

    return html`<div style=${{background:c.surface,border:'1px solid '+(anyRenew?this.tint(c.warning,.5):c.bs),borderRadius:'14px',padding:'18px 20px',position:'relative'}}>${overlay}${head}${body}${histBlock}</div>`;

  pkgBlock(p,pk,divider,readonly){

        <button onClick=${(e)=>{e.stopPropagation(); this.setState(st=>({pkgMenu:menuOpen?null:{pkgId:pk.id,patientId:p.id}}));}} title="Gerir pacote" style=${{display:readonly?'none':'grid',width:'28px',height:'28px',placeItems:'center',borderRadius:'7px',border:'1px solid '+(menuOpen?c.bd:'transparent'),background:menuOpen?c.surface2:'none',color:c.muted,cursor:'pointer',flexShrink:0}}><${Icon} name="Ellipsis" size=${17}/></button>
      </div>
      <div style=${{fontSize:'12px',color:c.muted,marginBottom:'12px',display:'flex',alignItems:'center',gap:'6px'}}><${Icon} name="CalendarClock" size=${13} style=${{flexShrink:0}}/> <span style=${{minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${this.pkgGradeLabel(pk)}</span></div>

        <span style=${{fontSize:'12px',color:(ending&&!paused)?c.warning:c.muted,fontWeight:(ending&&!paused)?700:500}}>${done?'pacote completo':(readonly?'':(rem+' restante'+(rem===1?'':'s')))}</span>
      </div>
      ${readonly?null:this.pkgContext(p,pk)}
      ${(!readonly&&menuOpen)?this.pkgMenuPop(p,pk):null}
    </div>`;
  }

  pkgContext(p,pk){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;
    const ending=this.pkgEnding(pk); const done=this.pkgDone(pk); const paused=pk.status==='pausado'; const next=this.pkgNext(pk);
    if(paused){
      return html`<div style=${{marginTop:'11px',padding:'11px 12px',borderRadius:'10px',background:c.surface2,border:'1px solid '+c.bs}}>
        <div style=${{display:'flex',alignItems:'flex-start',gap:'9px'}}><${Icon} name="Pause" size=${15} color=${c.muted} style=${{flexShrink:0,marginTop:'1px'}}/>
          <div style=${{flex:1,minWidth:0}}><div style=${{fontSize:'12.5px',fontWeight:600,color:c.text}}>Pausado${pk.retomaEm?html` · retoma ${this.pkgFmt(pk.retomaEm)}`:''}</div><div style=${{fontSize:'11.5px',color:c.muted,marginTop:'2px'}}>Validade estendida enquanto pausado. As ${this.pkgRemaining(pk)} sessões seguradas voltam à agenda ao retomar.</div></div>
        </div>
        <button onClick=${()=>this.pkgResume(p.id,pk.id)} style=${{marginTop:'10px',width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:'7px',padding:'8px',borderRadius:'8px',border:'1px solid '+c.bd,background:c.surface,color:c.text,fontWeight:600,cursor:'pointer',fontSize:'12.5px'}}><${Icon} name="Play" size=${14}/> Retomar pacote</button>

          <div style=${{flex:1,minWidth:0}}><div style=${{fontSize:'12.5px',fontWeight:600,color:c.text}}>${done?'Pacote concluído':'Pacote acabando'}</div><div style=${{fontSize:'11.5px',color:c.muted,marginTop:'1px'}}>${done?'Todas as sessões foram concluídas.':'Faltam poucas sessões para concluir.'}</div></div>
        </div>
      </div>`;
    }
    return html`<div style=${{marginTop:'9px',fontSize:'12px',color:c.muted,display:'flex',alignItems:'center',gap:'6px'}}>${next?html`<${Icon} name="CalendarClock" size=${13} color=${c.faint} style=${{flexShrink:0}}/> <span>Próxima: <b style=${{color:c.text,fontWeight:600}}>${this.dowLabel(next.dow)} ${this.pkgFmt(next.data)}${next.hora?(' · '+next.hora):''}</b></span>`:html`<span style=${{color:c.faint}}>Sem próxima sessão agendada.</span>`}</div>`;
  }

  pkgMenuPop(p,pk){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;
    const paused=pk.status==='pausado'; const rem=this.pkgRemaining(pk);
    const item=(icon,label,onClick,danger)=>html`<button onClick=${onClick} style=${{display:'flex',alignItems:'center',gap:'10px',width:'100%',padding:'8px 10px',borderRadius:'8px',border:'none',background:'transparent',color:danger?c.danger:c.text,cursor:'pointer',fontSize:'12.5px',textAlign:'left'}} onMouseEnter=${e=>e.currentTarget.style.background=danger?this.tint(c.danger,.09):c.surface2} onMouseLeave=${e=>e.currentTarget.style.background='transparent'}><${Icon} name=${icon} size=${15} color=${danger?c.danger:c.faint} style=${{flexShrink:0}}/> <span style=${{flex:1}}>${label}</span></button>`;
    const stepBtn=(icon,onClick,disabled)=>html`<button onClick=${onClick} disabled=${disabled} style=${{width:'26px',height:'26px',display:'grid',placeItems:'center',borderRadius:'7px',border:'1px solid '+c.bd,background:c.surface,color:disabled?c.faint:c.text,cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1}}><${Icon} name=${icon} size=${14}/></button>`;
    return html`<div style=${{position:'absolute',top:'32px',right:0,zIndex:40,width:'236px',background:c.surface,border:'1px solid '+c.bd,borderRadius:'11px',boxShadow:'0 16px 38px rgba(8,10,12,'+(c.d?.6:.16)+')',padding:'5px',animation:'mvScale .13s ease-out'}}>
      ${item('CalendarClock','Ver todas as sessões',()=>{this.setState({pkgMenu:null}); this.openModal('pkgSessoes',{patientId:p.id,pkgId:pk.id});})}
      ${item('Pencil','Ajustar grade / horário',()=>this.openPkgGrade(p.id,pk.id))}
      <div style=${{display:'flex',alignItems:'center',gap:'10px',padding:'6px 10px'}}>
        <${Icon} name="Hash" size=${15} color=${c.faint} style=${{flexShrink:0}}/>
        <span style=${{flex:1,fontSize:'12.5px'}}>Sessões</span>
        ${stepBtn('Minus',()=>this.pkgRemoveSession(p.id,pk.id),rem<=0)}
        <span style=${{fontFamily:"'Martian Mono', monospace",fontSize:'12.5px',fontWeight:700,minWidth:'22px',textAlign:'center'}}>${pk.total}</span>
        ${stepBtn('Plus',()=>this.pkgAddSession(p.id,pk.id),false)}
      </div>
      <div style=${{height:'1px',background:c.bs,margin:'4px 6px'}}></div>
      ${paused?item('Play','Retomar pacote',()=>this.pkgResume(p.id,pk.id)):item('Pause','Pausar pacote',()=>this.pkgPause(p.id,pk.id))}
      ${this.pkgDone(pk)?item('Archive','Arquivar no histórico',()=>this.archivePkg(p.id,pk.id)):null}
      ${item('CalendarX2','Cancelar pacote',()=>{this.setState({pkgMenu:null}); this.openModal('pkgCancelar',{patientId:p.id,pkgId:pk.id});},true)}
    </div>`;
  }

  // ---------- pacotes: ações de gestão ----------
  pkgAddSession(pid,pkgId){
    const p=this.patient(pid); const pk=(p&&p.pacotes||[]).find(x=>x.id===pkgId); if(!pk) return;
    const g=pk.grade||{}; const dows=(g.dows||[1,3]); const hor=g.horarios||{}; const tp=this.type(pk.typeId);
    const linked=this.pkgAppts(pk); const lastDs=linked.length?linked[linked.length-1].date:this.hoje();
    let cur=new Date(lastDs+'T00:00'); let ds=null; let guard=0;
    while(guard<800){ guard++; cur.setDate(cur.getDate()+1); const c=this.dstr(cur); if(dows.includes(cur.getDay()) && !this.state.holidays.some(h=>h.data===c&&h.tipo!=='horario')){ ds=c; break; } }
    if(!ds){ this.toast('Não foi possível encontrar uma data livre'); return; }
    const dw=new Date(ds+'T00:00').getDay(); const hh=hor[dw]||Object.values(hor)[0]||'08:00'; const paused=pk.status==='pausado';
    const na={id:'a'+Date.now(),profId:g.profId,typeId:pk.typeId,start:this.t2m(hh),dur:tp.dur,date:ds,status:'agendado',patientId:pid,pkgId:pkgId,encaixe:false,...(paused?{pkgHold:true}:{})};
    this.setState(st=>({appts:[...st.appts,na],patients:st.patients.map(pp=>pp.id!==pid?pp:{...pp,pacotes:(pp.pacotes||[]).map(x=>x.id===pkgId?{...x,total:x.total+1,status:x.status==='concluido'?'ativo':x.status}:x)})}));
    this.toast('1 sessão adicionada — agendada '+this.pkgFmt(ds));
  }
  pkgRemoveSession(pid,pkgId){
    const p=this.patient(pid); const pk=(p&&p.pacotes||[]).find(x=>x.id===pkgId); if(!pk) return;
    const linked=this.pkgAppts(pk);
    const future=linked.filter(a=>['agendado','confirmado'].includes(a.status));
    const removable=(future.length?future:linked.filter(a=>a.pkgHold)).slice(-1)[0];
    if(!removable){ this.toast('Não há sessão futura para remover'); return; }
    this.setState(st=>({appts:st.appts.filter(a=>a.id!==removable.id),patients:st.patients.map(pp=>pp.id!==pid?pp:{...pp,pacotes:(pp.pacotes||[]).map(x=>x.id===pkgId?{...x,total:Math.max(this.pkgUsadas(x),x.total-1)}:x)})}));
    this.toast('1 sessão removida do pacote');
  }
  pkgPause(pid,pkgId){
    const rd=new Date(this.hoje()+'T00:00'); rd.setDate(rd.getDate()+21); const retomaEm=this.dstr(rd); const hoje=this.hoje();
    this.setState(st=>({pkgMenu:null,
      appts:st.appts.map(a=>{ if(a.pkgId!==pkgId) return a; if(a.date>=hoje && ['agendado','confirmado'].includes(a.status)) return {...a,pkgHold:true}; return a; }),
      patients:st.patients.map(p=> p.id!==pid?p:{...p,pacotes:(p.pacotes||[]).map(pk=>pk.id===pkgId?{...pk,status:'pausado',retomaEm}:pk)})
    }));
    this.toast('Pacote pausado — sessões futuras retiradas da agenda.');
  }
  pkgResume(pid,pkgId){
    this.setState(st=>({pkgMenu:null,
      appts:st.appts.map(a=> a.pkgId===pkgId && a.pkgHold?{...a,pkgHold:false}:a),
      patients:st.patients.map(p=> p.id!==pid?p:{...p,pacotes:(p.pacotes||[]).map(pk=>{ if(pk.id!==pkgId) return pk; const np={...pk,status:'ativo'}; delete np.retomaEm; return np; })})
    }));
    this.toast('Pacote retomado — sessões voltam à agenda.');
  }
  cancelarPkg(pid,pkgId){
    const hoje=this.hoje();
    this.setState(st=>({modal:null,modalData:{},pkgMenu:null,
      appts:st.appts.map(a=>{ if(a.pkgId!==pkgId) return a; if(a.date>=hoje && (['agendado','confirmado'].includes(a.status)||a.pkgHold)) return {...a,status:'cancelado',pkgHold:false}; return a; }),
      patients:st.patients.map(p=> p.id!==pid?p:{...p,pacotes:(p.pacotes||[]).map(pk=>pk.id===pkgId?{...pk,status:'cancelado'}:pk)})
    }));
    this.toast('Pacote cancelado — sessões futuras liberadas da agenda.');
  }
  archivePkg(pid,pkgId){ this.setState(st=>({pkgMenu:null,patients:st.patients.map(p=>p.id!==pid?p:{...p,pacotes:(p.pacotes||[]).map(pk=>pk.id===pkgId?{...pk,status:'concluido'}:pk)})})); this.toast('Pacote arquivado no histórico'); }
  openPkgGrade(pid,pkgId){ const p=this.patient(pid); const pk=(p&&p.pacotes||[]).find(x=>x.id===pkgId); if(!pk) return; const g=pk.grade||{}; this.setState({pkgMenu:null}); this.openModal('pkgGrade',{patientId:pid,pkgId,dows:(g.dows||[]).slice(),horarios:{...(g.horarios||{})},profId:g.profId||'',profNome:g.profNome}); }
  pkgSaveGrade(d){
    const p=this.patient(d.patientId); const pk=(p&&p.pacotes||[]).find(x=>x.id===d.pkgId); if(!pk){ this.closeModal(); return; }
    const dows=d.dows||[]; const hor=d.horarios||{}; const profId=d.profId; const tp=this.type(pk.typeId); const hoje=this.hoje();
    const linked=this.pkgAppts(pk);
    const toReplace=linked.filter(a=>a.date>=hoje && (['agendado','confirmado'].includes(a.status)||a.pkgHold));
    const nCount=toReplace.length; const anyHold=toReplace.some(a=>a.pkgHold);
    const gen=[]; let cur=new Date(hoje+'T00:00'); cur.setDate(cur.getDate()-1); let guard=0;
    while(gen.length<nCount && guard<900){ guard++; cur.setDate(cur.getDate()+1); const ds=this.dstr(cur); if(!dows.includes(cur.getDay())) continue; if(this.state.holidays.some(h=>h.data===ds&&h.tipo!=='horario')) continue; const dw=cur.getDay(); const hh=hor[dw]||Object.values(hor)[0]||'08:00'; gen.push({id:'a'+Date.now()+'-'+gen.length,profId,typeId:pk.typeId,start:this.t2m(hh),dur:tp.dur,date:ds,status:'agendado',patientId:d.patientId,pkgId:pk.id,encaixe:false,...(anyHold?{pkgHold:true}:{})}); }
    const removeIds=new Set(toReplace.map(a=>a.id));
    this.setState(st=>({modal:null,modalData:{},appts:[...st.appts.filter(a=>!removeIds.has(a.id)),...gen],patients:st.patients.map(pp=>pp.id!==d.patientId?pp:{...pp,pacotes:(pp.pacotes||[]).map(x=>x.id===d.pkgId?{...x,grade:{...x.grade,dows,horarios:hor,profId}}:x)})}));
    this.toast(nCount?('Grade atualizada — '+nCount+' '+(nCount===1?'sessão remarcada':'sessões remarcadas')+' na agenda.'):'Grade atualizada.');
  }
  confirmRenovar(d){
    const p=this.patient(d.patientId); const pk=(this.pkgList(p)).find(x=>x.id===d.pkgId); if(!pk) return;
    const g=pk.grade||{}; const dows=(g.dows||[1,3]); const hor=g.horarios||{}; const tp=this.type(pk.typeId); const n=Math.max(1,d.n||pk.total);
    const linked=this.pkgAppts(pk); let lastDs=linked.length?linked[linked.length-1].date:this.hoje();
    const gen=[]; const now=Date.now();
    for(let k=0;k<n;k++){ let cur=new Date(lastDs+'T00:00'); let ds=null; let guard=0;
      while(guard<800){ guard++; cur.setDate(cur.getDate()+1); const cds=this.dstr(cur); if(dows.includes(cur.getDay()) && !this.state.holidays.some(h=>h.data===cds&&h.tipo!=='horario')){ ds=cds; break; } }
      if(!ds) break; const dw=new Date(ds+'T00:00').getDay(); const hh=hor[dw]||Object.values(hor)[0]||'08:00';
      gen.push({id:'a'+now+'-r'+k,profId:g.profId,typeId:pk.typeId,start:this.t2m(hh),dur:tp.dur,date:ds,status:'agendado',patientId:d.patientId,pkgId:pk.id,encaixe:false}); lastDs=ds;
    }
    this.setState(st=>({modal:null,modalData:{},appts:[...st.appts,...gen],patients:st.patients.map(pp=>pp.id!==d.patientId?pp:{...pp,pacotes:(pp.pacotes||[]).map(x=>x.id===pk.id?{...x,total:x.total+gen.length,status:'ativo'}:x)})}));
    this.toast('Pacote renovado — '+gen.length+' '+(gen.length===1?'sessão adicionada':'sessões adicionadas')+', mesma grade.');
  }
  openNovoPacoteAjuste(d){ const p=this.patient(d.patientId); const pk=(this.pkgList(p)).find(x=>x.id===d.pkgId); if(!pk) return; const g=pk.grade||{}; this.openModal('agendarPacote',{patientId:d.patientId,typeId:pk.typeId,n:d.n||pk.total,dows:(g.dows||[]).slice(),horarios:{...(g.horarios||{})},profId:g.profId||'',inicio:this.hoje(),faltaPunitiva:this.pkgPunitivo(pk)}); }

  // ---------- pacotes: modais ----------
  modalRenovar(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon; const d=this.state.modalData;
    const p=this.patient(d.patientId); const pk=p&&(this.pkgList(p)).find(x=>x.id===d.pkgId); if(!pk) return null;
    const g=pk.grade||{}; const col=this.pkgTypeColor(pk); const n=d.n||pk.total;
    const ses=this.pkgSessions(pk); const lastDs=ses.length?ses[ses.length-1].data:this.hoje();
    const preview=this.computeSerie({n,dows:(g.dows||[]).slice(),typeId:pk.typeId,fromDate:lastDs,inclusive:false});
    const nonHol=preview.filter(o=>!o.feriado); const startDs=nonHol.length?nonHol[0].data:null; const endDs=nonHol.length?nonHol[nonHol.length-1].data:null;
    const dow=ds=>this.dowLabel(new Date(ds+'T00:00').getDay());
    const row=(icon,label,valEl,last)=>html`<div style=${{display:'flex',alignItems:'center',gap:'11px',padding:'11px 13px',borderBottom:last?'none':'1px solid '+c.bs}}><${Icon} name=${icon} size=${15} color=${c.faint} style=${{flexShrink:0}}/><span style=${{fontSize:'12px',color:c.muted,width:'62px',flexShrink:0}}>${label}</span><div style=${{flex:1,minWidth:0,display:'flex',justifyContent:'flex-end'}}>${valEl}</div></div>`;
    const txt=t=>html`<span style=${{fontSize:'12.5px',fontWeight:600,textAlign:'right'}}>${t}</span>`;
    const body=html`<div>

  // ---------- computed ----------
  // Sessões "seguradas" (pacote pausado) ficam fora da agenda/contagens, mas continuam no pacote via pkgAppts.
  dayAppts(date){ return this.state.appts.filter(a=>a.date===(date||this.state.date) && !a.pkgHold); }
  profAppts(pid,date){ return this.dayAppts(date).filter(a=>a.profId===pid).sort((a,b)=>a.start-b.start); }
  apptPatients(a){ return a.patientIds?a.patientIds.map(id=>this.patient(id)):[this.patient(a.patientId)]; }
  needsAction(a){ return this.state.date==='2026-06-25' && (a.start+a.dur)<=702 && (a.status==='agendado'||a.status==='confirmado'); }
  conflictOf(a){ // returns conflicting appt id or null
    if(a.encaixe||a.status==='cancelado') return null;
    const end=a.start+a.dur;
    return this.dayAppts(a.date).find(b=>b.id!==a.id && !b.encaixe && b.status!=='cancelado' && b.profId===a.profId && a.start<(b.start+b.dur) && b.start<end);
  }
  checkConflict(profId,start,dur,date,ignoreId,encaixe){
    if(encaixe) return null;
    const end=start+dur;
    return this.dayAppts(date).find(b=>b.id!==ignoreId && !b.encaixe && b.status!=='cancelado' && b.profId===profId && start<(b.start+b.dur) && b.start<end);
  }
  // Períodos efetivos do profissional em um dia da semana (considera "seguir a clínica" + exceções por dia).
  profWeek(prof,dow,hoursOverride){
    if(!prof) return null;
    const av=prof.avail||{};
    if(prof.followClinic!==false){
      if(Object.prototype.hasOwnProperty.call(av,dow)) return av[dow]; // exceção: array de períodos ou null (fechado)
      return (hoursOverride||this.state.hours)[dow]||null;
    }
    return av[dow]||null;
  }
  // Exceção de data específica (fecha o dia inteiro ou define horário específico).
  dateException(date){ return this.state.holidays.find(h=>h.data===date)||null; }
  // Exceção de data do próprio profissional (folga/férias ou horário pontual). Tem prioridade sobre o horário semanal e sobre o horário especial da clínica.
  profException(prof,date){ if(!prof) return null; return (prof.exc||[]).find(e=>e.data===date)||null; }
  // Períodos efetivos do profissional numa data (aplica exceção de data por cima do horário semanal).
  dayPeriods(prof,date,hoursOverride){
    const ex=this.dateException(date);
    if(ex && ex.tipo!=='horario') return null; // clínica fechada — ninguém atende
    const pex=this.profException(prof,date);
    if(pex) return pex.tipo==='horario'?(pex.periods||[]):null; // exceção do profissional (folga ou horário pontual)
    if(ex) return ex.periods||[]; // horário especial da clínica
    return this.profWeek(prof,new Date(date+'T00:00').getDay(),hoursOverride);
  }
  // Genérico: agendamentos futuros (hoje em diante, ativos) que cabem no horário de hoje mas deixariam de caber após uma mudança.
  // afterFn(appt,prof) => períodos válidos DEPOIS da mudança ([ [ini,fim] … ] ou null=fechado). filterFn opcional restringe quais agendamentos considerar.
  futureConflicts(afterFn,filterFn){
    const today='2026-06-25';
    const fits=(ps,a)=>!!(ps&&ps.length&&ps.some(p=>a.start>=this.t2m(p[0])&&(a.start+a.dur)<=this.t2m(p[1])));
    const out=[];
    this.state.appts.forEach(a=>{
      if(['cancelado','concluido','faltou'].includes(a.status)) return;
      if(a.date<today) return; // só hoje em diante
      const prof=this.state.profs.find(p=>p.id===a.profId);
      if(!prof) return;
      if(filterFn && !filterFn(a,prof)) return;
      const before=this.dayPeriods(prof,a.date,this.state.hours);
      const after=afterFn(a,prof);
      // conflito apenas quando cabia no horário atual e deixa de caber no novo
      if(fits(before,a)&&!fits(after,a)){
        out.push({appt:a,prof,reason:(!after||!after.length)?'Sem atendimento após a mudança':('Fora do novo expediente ('+(after||[]).map(p=>p[0]+'–'+p[1]).join(', ')+')')});
      }
    });
    return out.sort((x,y)=>x.appt.date<y.appt.date?-1:(x.appt.date>y.appt.date?1:x.appt.start-y.appt.start));
  }
  // Agendamentos futuros que ficariam fora do expediente se o horário da clínica mudar para "draft".
  hourConflicts(draft){ return this.futureConflicts((a,prof)=>this.dayPeriods(prof,a.date,draft)); }
  saveHours(){
    const draft=this.state.hoursDraft;
    if(!draft){ this.toast('Nenhuma alteração para salvar'); return; }
    const conf=this.hourConflicts(draft);
    if(conf.length){ this.setState({modal:'horarioConflitos',conflictData:{conf,scope:'clinica'}}); return; }
    this.setState({hours:draft,hoursDraft:null});
    this.toast('Horário da clínica salvo');
  }
  discardHours(){ this.setState({hoursDraft:null}); this.toast('Alterações descartadas'); }
  checkAvail(profId,start,dur,date){
    const prof=this.state.profs.find(p=>p.id===profId);
    const end=start+dur;
    const ex=this.dateException(date);
    if(ex && ex.tipo!=='horario') return 'Data de exceção — clínica fechada ('+ex.nome+')';
    const pex=this.profException(prof,date);
    if(pex && pex.tipo!=='horario') return 'Profissional indisponível nesta data ('+pex.nome+')';
    const periods=this.dayPeriods(prof,date);
    if(!periods||!periods.length) return ex?('Data de exceção — sem atendimento ('+ex.nome+')'):(pex?('Profissional indisponível nesta data ('+pex.nome+')'):'Profissional não atende neste dia da semana');
    const fits=periods.some(p=>start>=this.t2m(p[0]) && end<=this.t2m(p[1]));
    if(!fits) return `Fora do expediente (${periods.map(p=>p[0]+'–'+p[1]).join(', ')})`;
    return null;
  }
  profDayMinutes(pid,date){ const prof=this.state.profs.find(p=>p.id===pid); const per=this.dayPeriods(prof,date||this.state.date); if(!per||!per.length) return 0; return per.reduce((s,p)=>s+(this.t2m(p[1])-this.t2m(p[0])),0); }
  occupancy(date){
    const d=date||this.state.date;
    const day=this.dayAppts(d).filter(a=>a.status!=='cancelado');
    const cap=this.state.profs.filter(p=>p.ativo).reduce((s,p)=>s+this.profDayMinutes(p.id,d),0);
    if(!cap) return 0;
    const used=day.reduce((s,a)=>s+a.dur,0);
    return Math.min(100,Math.round(used/cap*100));
  }
  profLoad(pid,date){
    const d=date||this.state.date;
    const day=this.profAppts(pid,d).filter(a=>a.status!=='cancelado');
    const cap=this.profDayMinutes(pid,d);
    if(!cap) return 0;
    const used=day.reduce((s,a)=>s+a.dur,0);
    return Math.min(100,Math.round(used/cap*100));
  }
  reports(date){
    const day=this.dayAppts(date);
    const ativos=day.filter(a=>a.status!=='cancelado');
    const concl=day.filter(a=>a.status==='concluido').length;
    const falt=day.filter(a=>a.status==='faltou').length;
    const taxa=(concl+falt)>0?Math.round(falt/(concl+falt)*100):0;
    const porProf=this.state.profs.map(p=>{
      const pa=day.filter(a=>a.profId===p.id&&a.status!=='cancelado');
      const c=pa.filter(a=>a.status==='concluido').length;
      const f=pa.filter(a=>a.status==='faltou').length;
      return {prof:p,total:pa.length,concl:c,falt:f,taxa:(c+f)>0?Math.round(f/(c+f)*100):0};
    });
    return {total:ativos.length,concl,falt,taxa,porProf};
  }

      if(!moved&&(Math.abs(ev.clientX-sx)>4||Math.abs(ev.clientY-sy)>4)) moved=true;
      const cols=Array.from(grid.querySelectorAll('[data-col]'));
      let colId=origCol;
      for(const cEl of cols){ const r=cEl.getBoundingClientRect(); if(ev.clientX>=r.left&&ev.clientX<=r.right){ colId=cEl.getAttribute('data-col'); break; } }
      const body=grid.querySelector('[data-col="'+colId+'"] [data-body]')||grid.querySelector('[data-body]');
      const r=body.getBoundingClientRect();
      let mins=480+(ev.clientY-grabDy-r.top)/this.ppm();
      mins=Math.max(480,Math.min(1080-a.dur,Math.round(mins/15)*15));

    if(e.button!==0) return;
    if(e.target.closest('[data-appt]')||e.target.closest('button')||e.target.closest('input')) return;
    const grid=this._gridEl; if(!grid) return;
    const sx=e.clientX, sy=e.clientY; const sl=grid.scrollLeft, stp=grid.scrollTop; let moved=false;
    const onMove=(ev)=>{ const dx=ev.clientX-sx, dy=ev.clientY-sy; if(!moved&&(Math.abs(dx)>4||Math.abs(dy)>4)){ moved=true; grid.style.cursor='grabbing'; } if(moved){ grid.scrollLeft=sl-dx; grid.scrollTop=stp-dy; } };
    const onUp=()=>{ window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp); if(moved){ this._afterDrag=Date.now(); grid.style.cursor=''; } };
    window.addEventListener('pointermove',onMove); window.addEventListener('pointerup',onUp);

  setMD(patch){ this.setState(st=>({modalData:{...st.modalData,...patch}})); }
  async lookupCep(cepRaw){
    const cep=(cepRaw||'').replace(/\D/g,'');
    if(cep.length!==8){ if(cep.length>0) this.setMD({cepStatus:null}); return; }
    this._cepReq=cep;
    this.setMD({cepStatus:'loading'});
    try{
      const r=await fetch('https://viacep.com.br/ws/'+cep+'/json/');
      const j=await r.json();
      if(this._cepReq!==cep) return; // usuário mudou o CEP no meio da consulta
      if(j.erro){ this.setMD({cepStatus:'notfound'}); return; }
      const patch={cepStatus:'ok'};
      if(j.logradouro) patch.endereco=j.logradouro;
      if(j.bairro) patch.bairro=j.bairro;
      if(j.localidade) patch.cidade=j.localidade;
      if(j.uf) patch.uf=j.uf;
      this.setMD(patch);
    }catch(e){ if(this._cepReq===cep) this.setMD({cepStatus:'error'}); }
  }
  maskCPF(v){ const d=(v||'').replace(/\D/g,'').slice(0,11); let o=d.slice(0,3); if(d.length>3)o+='.'+d.slice(3,6); if(d.length>6)o+='.'+d.slice(6,9); if(d.length>9)o+='-'+d.slice(9,11); return o; }
  maskRG(v){ const d=(v||'').toUpperCase().replace(/[^0-9X]/g,'').slice(0,9); let o=d.slice(0,2); if(d.length>2)o+='.'+d.slice(2,5); if(d.length>5)o+='.'+d.slice(5,8); if(d.length>8)o+='-'+d.slice(8,9); return o; }
  maskTel(v){ const d=(v||'').replace(/\D/g,'').slice(0,11); if(d.length===0)return ''; if(d.length<=2)return '('+d; let o='('+d.slice(0,2)+') '; const r=d.slice(2); if(r.length<=4)return o+r; if(d.length<=10){ o+=r.slice(0,4)+'-'+r.slice(4); } else { o+=r.slice(0,5)+'-'+r.slice(5); } return o; }
  maskCEP(v){ const d=(v||'').replace(/\D/g,'').slice(0,8); return d.length>5?d.slice(0,5)+'-'+d.slice(5):d; }
  maskDate(v){ const d=(v||'').replace(/\D/g,'').slice(0,8); let o=d.slice(0,2); if(d.length>2)o+='/'+d.slice(2,4); if(d.length>4)o+='/'+d.slice(4,8); return o; }
  maskMY(v){ const d=(v||'').replace(/\D/g,'').slice(0,6); let o=d.slice(0,2); if(d.length>2)o+='/'+d.slice(2,6); return o; }
  maskCNPJ(v){ const d=(v||'').replace(/\D/g,'').slice(0,14); let o=d.slice(0,2); if(d.length>2)o+='.'+d.slice(2,5); if(d.length>5)o+='.'+d.slice(5,8); if(d.length>8)o+='/'+d.slice(8,12); if(d.length>12)o+='-'+d.slice(12,14); return o; }
  modalNovoAgendamento(){

      ${overCap&&!d.encaixe?html`<div style=${{marginTop:'8px',padding:'10px 12px',borderRadius:'8px',background:this.tint(c.warning,.12),color:'#9a6a05',fontSize:'12.5px',display:'flex',gap:'8px',alignItems:'flex-start'}}><${Icon} name="TriangleAlert" size=${16}/><span>A turma ficaria com ${totalAfter}/${cap}. Marque “Encaixe” para exceder a capacidade.</span></div>`:null}

    const setPeriodos=(i,fn)=>setRegras(r=>r.map((x,xi)=>{ if(xi!==i) return x; const pers=this.filaRegraPeriodos(x).map(p=>p.slice()); const y={...x,periodos:fn(pers)}; delete y.ini; delete y.fim; return y; }));

  modalProf(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon; const d=this.state.modalData; const sel=this.inputStyle(c);
    const ci=d.ci||1;
    const follow=d.followClinic!==false;
    const av=d.avail||{};
    const clinic=this.state.hours;
    const wds=[['Segunda',1],['Terça',2],['Quarta',3],['Quinta',4],['Sexta',5],['Sábado',6],['Domingo',0]];
    const setAvail=m=>this.setMD({avail:m});
    const updDay=(dow,fn)=>{ const m={...av}; const cur=Array.isArray(m[dow])?m[dow].map(p=>p.slice()):[]; m[dow]=fn(cur); setAvail(m); };
    const setP=(dow,pi,idx,v)=>updDay(dow,day=>{day[pi][idx]=v; return day;});
    const addP=(dow)=>updDay(dow,day=>{const cl=this.state.hours[dow]||[]; const last=day.length?day[day.length-1][1]:(cl[0]?cl[0][0]:'13:00'); const end=cl.length?cl[cl.length-1][1]:'18:00'; day.push([last,end]); return day;});
    const rmP=(dow,pi)=>updDay(dow,day=>{day.splice(pi,1); return day;});
    const fmt=ps=>(ps||[]).map(p=>p[0]+'–'+p[1]).join(', ');
    // No modo personalizado cada período do profissional deve caber inteiramente dentro de um período da clínica no mesmo dia.
    const dayValid=(dow)=>{ const day=av[dow]; if(!Array.isArray(day)||!day.length) return true; const cl=clinic[dow]; if(!cl||!cl.length) return false; return day.every(p=>this.t2m(p[0])<this.t2m(p[1]) && cl.some(cp=>this.t2m(cp[0])<=this.t2m(p[0]) && this.t2m(p[1])<=this.t2m(cp[1]))); };
    const invalidDays=follow?[]:[1,2,3,4,5,6,0].filter(dow=>Array.isArray(av[dow])&&av[dow].length&&!dayValid(dow));
    const hasInvalid=invalidDays.length>0;
    const toggleOwn=(dow,on)=>{ const m={...av}; if(on){ const cl=clinic[dow]; if(!cl||!cl.length) return; m[dow]=(Array.isArray(av[dow])&&av[dow].length?av[dow]:cl.map(p=>p.slice())); } else delete m[dow]; setAvail(m); };
    const dayRow=([lbl,dow])=>{
      const cl=clinic[dow]; const clinicOpen=!!(cl&&cl.length);
      const day=Array.isArray(av[dow])?av[dow]:null; const on=!!(day&&day.length);
      const bad=on&&!dayValid(dow);
      const minT=clinicOpen?cl[0][0]:undefined; const maxT=clinicOpen?cl[cl.length-1][1]:undefined;
      return html`<div key=${dow} style=${{display:'flex',alignItems:'flex-start',gap:'10px',padding:'9px 10px',borderTop:'1px solid '+c.bs,background:on?'transparent':c.surface2}}>
        <div style=${{display:'flex',alignItems:'center',gap:'8px',width:'120px',flexShrink:0,paddingTop:'3px'}}>${this.switchToggle(c,on,()=>toggleOwn(dow,!on),!clinicOpen)}<span style=${{fontSize:'12.5px',fontWeight:600,color:clinicOpen?c.text:c.faint}}>${lbl}</span></div>
        <div style=${{flex:1,minWidth:0}}>
          ${!clinicOpen?html`<span style=${{fontSize:'12px',color:c.faint,lineHeight:'30px'}}>Clínica fechada</span>`
            :on?html`${this.periodEditor(c,day,{set:(pi,idx,v)=>setP(dow,pi,idx,v),add:()=>addP(dow),rm:pi=>rmP(dow,pi),min:minT,max:maxT})}<div style=${{fontSize:'10.5px',marginTop:'4px',fontFamily:"'Martian Mono', monospace",color:bad?c.danger:c.faint}}>${bad?'Deve ficar dentro do horário da clínica ('+fmt(cl)+')':'Clínica: '+fmt(cl)}</div>`
            :html`<span style=${{fontSize:'12px',color:c.faint,lineHeight:'30px'}}>Não atende</span>`}
        </div>
      </div>`;
    };
    const body=html`<div>
      ${this.fld('Nome',html`<input value=${d.nome||''} onChange=${e=>this.setMD({nome:e.target.value})} placeholder="Dra. Nome Sobrenome" style=${sel}/>`)}
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
        ${this.fld('CREFITO',html`<input value=${d.crefito||''} onChange=${e=>this.setMD({crefito:e.target.value})} placeholder="CREFITO 3/000000-F" style=${{...sel,fontFamily:"'Martian Mono', monospace"}}/>`)}
        ${this.fld('Subárea',html`<input value=${d.sub||''} onChange=${e=>this.setMD({sub:e.target.value})} placeholder="Ortopedia" style=${sel}/>`)}
      </div>
      ${this.fld('Status',html`<select value=${d.ativo===false?'inativo':'ativo'} onChange=${e=>this.setMD({ativo:e.target.value==='ativo'})} style=${sel}><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select>`)}
      ${this.fld('Cor',html`<div style=${{display:'flex',gap:'8px'}}>${this.cat.map((col,i)=>html`<button key=${i} onClick=${()=>this.setMD({ci:i+1})} style=${{width:'34px',height:'34px',borderRadius:'8px',background:col,border:ci===i+1?'3px solid '+c.text:'3px solid transparent',cursor:'pointer'}}></button>`)}</div>`)}
      <div style=${{margin:'4px 0 6px'}}><span style=${{fontSize:'12px',fontWeight:600,color:c.muted}}>Horário de atendimento</span></div>
      <div style=${{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',borderRadius:'9px',border:'1px solid '+(follow?c.teal.solid:c.bd),background:follow?c.teal.subtle:c.surface,marginBottom:'8px'}}>
        ${this.switchToggle(c,follow,()=>this.setMD({followClinic:!follow}))}
        <div><div style=${{fontSize:'13px',fontWeight:600}}>Seguir o horário da clínica</div><div style=${{fontSize:'11.5px',color:c.muted}}>${follow?'O profissional atende exatamente no horário da clínica.':'Defina o horário do profissional — sempre dentro do horário de funcionamento da clínica.'}</div></div>
      </div>
      ${follow?'':html`<div style=${{border:'1px solid '+c.bs,borderRadius:'8px',overflow:'hidden'}}>
        ${wds.map(dayRow)}
      </div>${hasInvalid?html`<div style=${{marginTop:'8px',padding:'8px 11px',borderRadius:'8px',background:this.tint(c.danger,.1),color:c.danger,fontSize:'11.5px',fontWeight:600,display:'flex',alignItems:'center',gap:'7px'}}><${Icon} name="TriangleAlert" size=${14}/> Há horários fora do funcionamento da clínica. Ajuste antes de salvar.</div>`:''}`}
    </div>`;
    const footer=html`${this.btnS('Cancelar',()=>this.closeModal())}${this.btnP('Salvar',()=>this.saveProf({id:d.id,nome:d.nome,crefito:d.crefito,sub:d.sub,ci,ativo:d.ativo!==false,followClinic:follow,avail:av}),!d.nome||hasInvalid)}`;
    return this.modalShell(d.id?'Editar profissional':'Novo profissional',body,footer,'560px');
  }

  prioMeta(p){ const m={urgente:{label:'Urgente',color:'#E5484D'},alta:{label:'Alta',color:'#F5A623'},normal:{label:'Normal',color:'#2B7FFF'},baixa:{label:'Baixa',color:'#AEB6BE'}}; return m[p]; }
  // ---- disponibilidade da fila ----
  wdShort(d){ return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d]; }
  filaProfIds(f){ return f.profIds||(f.profId?[f.profId]:[]); }
  filaRegraExpirada(r){ return r.tipo==='data' && !!r.data && r.data<'2026-06-25'; }
  filaRegraPeriodos(r){ return r.periodos||(r.ini?[[r.ini,r.fim]]:[]); }
  filaRegraPrefix(r){ if(r.tipo==='data'){ if(!r.data) return '—'; const dd=new Date(r.data+'T00:00'); return dd.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); } return (r.dows||[]).slice().sort((a,b)=>a-b).map(d=>this.wdShort(d)).join('/'); }
  filaRegraLabel(r){
    const hh=this.filaRegraPeriodos(r).map(p=>p[0]+'–'+p[1]).join(', ');
    if(r.tipo==='data'){ if(!r.data) return '—'; const dd=new Date(r.data+'T00:00'); return dd.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' · '+hh; }
    return (r.dows||[]).slice().sort((a,b)=>a-b).map(d=>this.wdShort(d)).join('/')+' · '+hh;
  }
  // Gera regras semanais a partir da agenda cadastrada do profissional (agrupa dias com o mesmo horário).
  profDefaultRegras(profId){
    const prof=this.state.profs.find(p=>p.id===profId); if(!prof) return [];
    const groups={};
    [1,2,3,4,5,6].forEach(dow=>{ const ps=this.profWeek(prof,dow)||[]; if(!ps.length) return; const sig=ps.map(p=>p[0]+'-'+p[1]).join('|'); if(!groups[sig]) groups[sig]={dows:[],periodos:ps.map(p=>p.slice())}; groups[sig].dows.push(dow); });
    return Object.keys(groups).map(sig=>({tipo:'semana',dows:groups[sig].dows,periodos:groups[sig].periodos}));
  }
  // Motor de match: vagas reais e livres na agenda compatíveis com um item da fila (profissional preferido + janela + regras).
  filaVagas(f){
    if(!f) return [];
    const TODAY='2026-06-25', NOW=702, DUR=50, DAYS=14, STEP=30, CAP=50;
    const anchor=new Date(TODAY+'T00:00');
    const prefIds=this.filaProfIds(f);
    const profs=(prefIds.length?prefIds.map(id=>this.state.profs.find(p=>p.id===id)):this.state.profs.filter(p=>p.ativo)).filter(p=>p&&p.ativo!==false);
    if(!profs.length) return [];
    const janela=f.janela||'qualquer';
    const regras=(f.regras||[]).filter(r=>!this.filaRegraExpirada(r) && this.filaRegraPeriodos(r).length);
    // Passa na janela + regras? devolve ruleIdx (>=0), -1 (sem regras) ou null (não passa)
    const fitsWin=(start,end,date,dow)=>{
      if(janela==='manhã' && start>=720) return null;
      if(janela==='tarde' && start<720) return null;
      if(!regras.length) return -1;
      const idx=(f.regras||[]).findIndex(r=>{
        if(this.filaRegraExpirada(r)) return false;
        if(r.tipo==='data'){ if(r.data!==date) return false; }
        else if(!((r.dows||[]).includes(dow))) return false;
        return this.filaRegraPeriodos(r).some(pp=>start>=this.t2m(pp[0])&&end<=this.t2m(pp[1]));
      });
      return idx<0?null:idx;
    };
    const out=[]; const seen=new Set();
    const add=(date,start,profId,dow,ruleIdx,freed)=>{ const k=date+'|'+start+'|'+profId; if(seen.has(k)) return; seen.add(k); out.push({date,start,dur:DUR,profId,dow,ruleIdx,freed}); };
    for(let dOff=0; dOff<DAYS; dOff++){
      const dd=new Date(anchor); dd.setDate(dd.getDate()+dOff);
      const date=this.dstr(dd); const dow=dd.getDay();
      const dayA=this.dayAppts(date);
      const busyAll=dayA.filter(a=>a.status!=='cancelado'&&a.status!=='faltou');
      const freeAll=dayA.filter(a=>a.status==='cancelado'||a.status==='faltou');
      for(const prof of profs){
        const periods=this.dayPeriods(prof,date);
        if(!periods||!periods.length) continue;
        const busy=busyAll.filter(a=>a.profId===prof.id).map(a=>[a.start,a.start+a.dur]);
        const inPeriod=(start,end)=>periods.some(p=>start>=this.t2m(p[0])&&end<=this.t2m(p[1]));
        const isFree=(start,end)=>!busy.some(b=>start<b[1]&&b[0]<end);
        // 1) VAGAS QUE ABRIRAM (cancelamento/falta): horário exato, sempre listado, sem esconder atrás de outra brecha.
        freeAll.filter(a=>a.profId===prof.id).forEach(a=>{
          const start=a.start, end=start+DUR;
          if(dOff===0 && start<NOW) return;
          if(!inPeriod(start,end) || !isFree(start,end)) return;
          const ri=fitsWin(start,end,date,dow); if(ri===null) return;
          add(date,start,prof.id,dow,ri,true);
        });
        // 2) Disponibilidade geral: primeira brecha livre de cada período.
        for(const per of periods){
          const ps=this.t2m(per[0]), pe=this.t2m(per[1]);
          for(let s=ps; s+DUR<=pe; s+=STEP){
            const start=s, end=s+DUR;
            if(dOff===0 && start<NOW) continue;
            const ri=fitsWin(start,end,date,dow); if(ri===null) continue;
            if(!isFree(start,end)) continue;
            add(date,start,prof.id,dow,ri,false);
            break;
          }
        }
      }
      if(out.length>=CAP) break;
    }
    // vagas que abriram primeiro, depois por data/horário
    out.sort((a,b)=> (b.freed?1:0)-(a.freed?1:0) || (a.date<b.date?-1:a.date>b.date?1:0) || (a.start-b.start) || (a.profId<b.profId?-1:a.profId>b.profId?1:0));
    return out;
  }
  filaTemAbriu(vagas){ return (vagas||[]).some(v=>v.freed); }
  vagaLabel(v){ const dd=new Date(v.date+'T00:00'); const wd=['dom','seg','ter','qua','qui','sex','sáb'][dd.getDay()]; return wd+' '+String(dd.getDate()).padStart(2,'0')+'/'+String(dd.getMonth()+1).padStart(2,'0'); }

  // Célula de disponibilidade da fila: chips ficam teal + clicáveis quando aquela janela tem vaga livre casada.
  filaDispCell(f,vagas){
    const c=this.theme(); const html=this.html;
    const jan=f.janela&&f.janela!=='qualquer'?f.janela:null;
    const regras=f.regras||[];
    const base={fontSize:'10.5px',fontWeight:500,padding:'2px 7px',borderRadius:'5px',lineHeight:1.5,whiteSpace:'nowrap'};
    const neutral=(label,exp,mono,key)=>html`<span key=${key} style=${{...base,background:'transparent',border:'1px '+(exp?'dashed':'solid')+' '+(exp?c.bs:c.bd),color:exp?c.faint:c.text,textDecoration:exp?'line-through':'none',fontFamily:mono?"'Martian Mono', monospace":'inherit'}}>${label}</span>`;
    const match=(label,slot,key)=>html`<button key=${key} onClick=${()=>this.offerVaga(f,slot)} title=${'Oferecer '+this.vagaLabel(slot)+' às '+this.m2t(slot.start)+(slot.freed?' · vaga que abriu':'')} style=${{...base,whiteSpace:'normal',flexWrap:'wrap',textAlign:'left',fontWeight:600,display:'inline-flex',alignItems:'center',gap:'4px 5px',cursor:'pointer',background:slot.freed?c.teal.solid:c.teal.subtle,border:'1px solid '+c.teal.border,color:slot.freed?'#fff':c.teal.text}}><span style=${{width:'6px',height:'6px',borderRadius:'50%',background:slot.freed?'#fff':c.teal.solid,flexShrink:0}}></span><span style=${{whiteSpace:'nowrap'}}>${label}</span><span style=${{fontFamily:"'Martian Mono', monospace",fontWeight:700,whiteSpace:'nowrap'}}>${this.vagaLabel(slot)} ${this.m2t(slot.start)}</span>${slot.freed?html`<span style=${{fontSize:'8.5px',fontWeight:800,letterSpacing:'.05em',background:'rgba(255,255,255,.25)',padding:'1px 4px',borderRadius:'3px'}}>ABRIU</span>`:''}</button>`;
    const items=[];
    if(regras.length){
      if(jan) items.push(neutral(jan==='manhã'?'Manhã':'Tarde',false,false,'jan'));
      regras.forEach((r,i)=>{ const exp=this.filaRegraExpirada(r); const slot=exp?null:vagas.find(v=>v.ruleIdx===i);
        if(slot) items.push(match(this.filaRegraPrefix(r),slot,'r'+i));
        else items.push(neutral(this.filaRegraLabel(r),exp,true,'r'+i));
      });
    } else {
      const slot=vagas[0];
      const label=jan?(jan==='manhã'?'Manhã':'Tarde'):(slot?'Qualquer':'Qualquer horário');
      if(slot) items.push(match(label,slot,'m')); else items.push(neutral(label,false,false,'m'));
    }
    if(!vagas.length) items.push(html`<span key="no" style=${{fontSize:'10.5px',color:c.faint,fontStyle:'italic'}}>· sem vaga compatível</span>`);
    return html`<div style=${{display:'flex',flexWrap:'wrap',gap:'5px',alignItems:'center'}}>${items}</div>`;
  }

  renderProfForm(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon; const d=this.state.modalData;

    const clinic=this.state.hours;
    const setAvail=m=>this.setMD({avail:m});

    const setP=(dow,pi,idx,v)=>updDay(dow,day=>{day[pi][idx]=v; return day;});
    const addP=(dow)=>updDay(dow,day=>{const cl=this.state.hours[dow]||[]; const last=day.length?day[day.length-1][1]:(cl[0]?cl[0][0]:'13:00'); const end=cl.length?cl[cl.length-1][1]:'18:00'; day.push([last,end]); return day;});
    const rmP=(dow,pi)=>updDay(dow,day=>{day.splice(pi,1); return day;});

    const dayValid=(dow)=>{ const day=av[dow]; if(!Array.isArray(day)||!day.length) return true; const cl=clinic[dow]; if(!cl||!cl.length) return false; return day.every(p=>this.t2m(p[0])<this.t2m(p[1]) && cl.some(cp=>this.t2m(cp[0])<=this.t2m(p[0]) && this.t2m(p[1])<=this.t2m(cp[1]))); };

    const rmExc=(id)=>this.setMD({exc:exc.filter(e=>e.id!==id)});

  // Editor reutilizável de períodos (lista de [início,fim]); permite mais de um período no mesmo dia. h.min/h.max limitam os horários.
  periodEditor(c,periods,h){

    const t={flex:'1 1 0',minWidth:0,width:'auto',maxWidth:'112px',height:'30px',padding:'0 6px',borderRadius:'7px',border:'1px solid '+c.bd,background:c.surface,color:c.text,fontFamily:"'Martian Mono', monospace",fontSize:'11.5px'};

        <input type="time" step=${900} min=${h.min} max=${h.max} value=${p[0]} onChange=${e=>h.set(pi,0,e.target.value)} style=${t}/>
        <span style=${{color:c.faint}}>–</span>

  cfgHorario(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;
    const wds=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    const dirty=!!this.state.hoursDraft;
    const H=this.state.hoursDraft||this.state.hours;
    const upd=(d,fn)=>this.setState(st=>{const base=st.hoursDraft||st.hours; const day=(base[d]||[]).map(p=>p.slice()); const nd=fn(day); return {hoursDraft:{...base,[d]:(nd&&nd.length)?nd:null}};});
    const setP=(d,pi,idx,val)=>upd(d,day=>{day[pi][idx]=val; return day;});
    const addP=(d)=>upd(d,day=>{const last=day.length?day[day.length-1][1]:'13:00'; day.push([last, last<'18:00'?'18:00':'19:00']); return day;});
    const rmP=(d,pi)=>upd(d,day=>{day.splice(pi,1); return day;});
    const toggle=(d,on)=>this.setState(st=>{const base=st.hoursDraft||st.hours; return {hoursDraft:{...base,[d]:on?[['08:00','12:00'],['13:00','18:00']]:null}};});
    const espelhar=()=>{this.setState(st=>{const base=st.hoursDraft||st.hours; const ref=base[1]||[['08:00','12:00'],['13:00','18:00']]; const nh={...base}; [1,2,3,4,5].forEach(x=>nh[x]=ref.map(p=>p.slice())); return {hoursDraft:nh};}); this.toast('Horário espelhado em Seg–Sex');};

      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}><div style=${{fontWeight:600,fontSize:'14px'}}>Horário de atendimento da clínica</div><button onClick=${espelhar} style=${{display:'flex',alignItems:'center',gap:'5px',padding:'6px 11px',borderRadius:'7px',border:'1px solid '+c.bs,background:c.surface,color:c.teal.text,fontWeight:600,cursor:'pointer',fontSize:'12px'}}><${Icon} name="Copy" size=${13}/> Espelhar Seg → Seg–Sex</button></div>
      <div style=${{fontSize:'12px',color:c.muted,marginBottom:'6px'}}>Cada dia pode ter mais de um período (ex.: manhã e tarde, com intervalo de almoço).</div>
      ${[1,2,3,4,5,6,0].map(d=>{const h=H[d]; const on=!!(h&&h.length);

  // ================= RELATÓRIOS =================
  // Histórico sintético determinístico (1–27 jun) para dar substância aos filtros de período.
  // O dia de hoje (25/06) usa os agendamentos reais do state; os demais são gerados.
  histAppts(){
    if(this._hist) return this._hist;
    let s=20260601; const rnd=()=>{s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff;};
    const ri=(a,b)=>a+Math.floor(rnd()*(b-a+1));
    const out=[]; const profs=this.state.profs; const tIds=this.state.types.map(t=>t.id);
    const slots=[480,540,600,660,780,840,900,960,1020];
    const today='2026-06-25';
    for(let d=new Date(2026,5,1); d<=new Date(2026,5,27); d.setDate(d.getDate()+1)){
      const dow=d.getDay(); if(dow===0) continue;
      const ds=this.dstr(d); if(ds===today) continue;
      const isPast=d<new Date(2026,5,25);
      profs.forEach((p,pi)=>{
        const n=dow===6?ri(2,4):ri(5,9);
        for(let i=0;i<n;i++){
          const tid=tIds[ri(0,tIds.length-1)]; const tp=this.type(tid);
          let status; if(isPast){ const r=rnd(); status=r<0.79?'concluido':r<0.90?'faltou':'cancelado'; } else { status=rnd()<0.5?'confirmado':'agendado'; }
          out.push({id:'h_'+ds+'_'+p.id+'_'+i,profId:p.id,typeId:tid,start:slots[i%slots.length],dur:tp.dur,date:ds,status,patientId:'pac'+ri(1,24),_hist:true});
        }
      });
    }
    this._hist=out; return out;
  }
  periodRange(){
    const t=new Date(2026,5,25); const p=this.state.repPeriodo||'mes';
    if(p==='hoje') return {from:'2026-06-25',to:'2026-06-25',label:'Hoje'};
    if(p==='semana'){ const mon=new Date(t); mon.setDate(t.getDate()-((t.getDay()+6)%7)); const sat=new Date(mon); sat.setDate(mon.getDate()+5); return {from:this.dstr(mon),to:this.dstr(sat),label:'Esta semana'}; }
    return {from:'2026-06-01',to:'2026-06-30',label:'Este mês'};
  }
  apptsInRange(from,to){
    const h=this.histAppts().filter(a=>a.date>=from&&a.date<=to);
    const r=this.state.appts.filter(a=>a.date>=from&&a.date<=to);
    return h.concat(r);
  }
  reports2(){
    const {from,to,label}=this.periodRange();
    const profSel=this.state.repProf||'todos';
    let appts=this.apptsInRange(from,to);
    if(profSel!=='todos') appts=appts.filter(a=>a.profId===profSel);
    const price={t1:180,t2:120,t3:130,t4:70,t5:90};
    const ativos=appts.filter(a=>a.status!=='cancelado');
    const conclA=appts.filter(a=>a.status==='concluido');
    const faltA=appts.filter(a=>a.status==='faltou');
    const cancA=appts.filter(a=>a.status==='cancelado');
    const futA=appts.filter(a=>['agendado','confirmado','em_atendimento'].includes(a.status));
    const taxaFalta=(conclA.length+faltA.length)>0?Math.round(faltA.length/(conclA.length+faltA.length)*100):0;
    const fat=conclA.reduce((s,a)=>s+(price[a.typeId]||100),0);
    const ticket=conclA.length?Math.round(fat/conclA.length):0;
    let openDays=0; for(let d=new Date(from+'T00:00'); d<=new Date(to+'T00:00'); d.setDate(d.getDate()+1)){ if(d.getDay()!==0) openDays++; }
    const activeProfs=profSel!=='todos'?1:this.state.profs.filter(p=>p.ativo).length;
    const capacity=Math.max(1,openDays*activeProfs*9);
    const ocup=Math.min(100,Math.round(ativos.length/capacity*100));
    const porTipo=this.state.types.map(t=>({type:t,n:ativos.filter(a=>a.typeId===t.id).length,fat:conclA.filter(a=>a.typeId===t.id).length*(price[t.id]||100)})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
    const maxTipo=Math.max(1,...porTipo.map(x=>x.n));
    const dias=[]; for(let d=new Date(from+'T00:00'); d<=new Date(to+'T00:00'); d.setDate(d.getDate()+1)){ if(d.getDay()===0) continue; const ds=this.dstr(d); const list=ativos.filter(a=>a.date===ds); dias.push({ds,date:new Date(d),n:list.length,concl:list.filter(a=>a.status==='concluido').length}); }
    const maxDia=Math.max(1,...dias.map(x=>x.n));
    const porProf=this.state.profs.filter(p=>profSel==='todos'||p.id===profSel).map(p=>{
      const pa=appts.filter(a=>a.profId===p.id&&a.status!=='cancelado');
      const cc=pa.filter(a=>a.status==='concluido');
      const ff=pa.filter(a=>a.status==='faltou').length;
      return {prof:p,total:pa.length,concl:cc.length,falt:ff,taxa:(cc.length+ff)>0?Math.round(ff/(cc.length+ff)*100):0,fat:cc.reduce((s,a)=>s+(price[a.typeId]||100),0)};
    }).sort((a,b)=>b.total-a.total);
    const maxProf=Math.max(1,...porProf.map(x=>x.total));
    const busiest=dias.slice().sort((a,b)=>b.n-a.n)[0]||null;
    return {from,to,label,total:ativos.length,concl:conclA.length,falt:faltA.length,canc:cancA.length,fut:futA.length,taxaFalta,fat,ticket,ocup,porTipo,maxTipo,dias,maxDia,porProf,maxProf,busiest,openDays};
  }

      <div style=${{marginBottom:'14px'}}>${card(showDaily?'Volume por dia':'Volume por profissional',showDaily?html`<span style=${{fontSize:'11.5px',color:c.faint}}>${r.total} atendimentos</span>`:null,trend)}</div>
      <div style=${{display:'grid',gridTemplateColumns:narrow?'1fr':'1fr 1fr',gap:'14px',marginBottom:'14px'}}>
        ${card('Por tipo de atendimento',null,r.porTipo.length?tipoCard:html`<div style=${{color:c.faint,fontSize:'13px',padding:'8px 0'}}>Sem dados no período.</div>`)}
        ${card('Composição por status',null,statusCard)}
      </div>
      ${card('Desempenho por profissional',null,profTable)}
    </div>`;
  }

  // ================= LOGIN =================
  renderLogin(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;
    return html`<div style=${{height:'100dvh',width:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:c.canvas,fontFamily:"'Hanken Grotesk', sans-serif",color:c.text,position:'relative',overflow:'hidden'}}>
      <div style=${{position:'absolute',top:0,left:0,right:0,height:'3px',background:c.teal.solid}}></div>
      <div style=${{width:'380px',maxWidth:'92vw',padding:'34px 30px',borderRadius:'14px',border:'1px solid '+c.bs,background:c.surface,boxShadow:c.d?'none':'0 12px 40px rgba(20,24,30,.08)',animation:'mvScale .25s ease-out'}}>
        <div style=${{display:'flex',alignItems:'center',gap:'10px',marginBottom:'24px'}}>
          <div style=${{width:'36px',height:'36px',borderRadius:'9px',background:c.teal.solid,display:'grid',placeItems:'center'}}><${Icon} name="Activity" size=${21} color="#fff" strokeWidth=${2.4}/></div>
          <div style=${{fontWeight:800,fontSize:'20px',letterSpacing:'-.02em'}}>Movimento</div>
        </div>
        <div style=${{fontWeight:700,fontSize:'17px',marginBottom:'4px'}}>Entrar na clínica</div>
        <div style=${{fontSize:'13px',color:c.muted,marginBottom:'20px'}}>O sistema que enche a sua agenda.</div>
        ${this.fld('E-mail',html`<input defaultValue="recepcao@movimento.com.br" style=${this.inputStyle(c)}/>`)}
        ${this.fld('Senha',html`<input type="password" defaultValue="••••••••" style=${this.inputStyle(c)}/>`)}
        <button onClick=${()=>this.go('agenda')} style=${{width:'100%',padding:'11px',borderRadius:'8px',border:'none',background:c.primary,color:c.onPrimary,fontWeight:700,fontSize:'14px',cursor:'pointer',marginTop:'6px'}}>Entrar</button>
        <div style=${{textAlign:'center',marginTop:'14px',fontSize:'12.5px',color:c.faint}}>Esqueceu a senha? <span style=${{color:c.teal.text,fontWeight:600,cursor:'pointer'}}>Recuperar</span></div>
      </div>
      <button onClick=${()=>this.setState({dark:!this.state.dark})} style=${{position:'absolute',bottom:'18px',right:'18px',width:'36px',height:'36px',borderRadius:'8px',border:'1px solid '+c.bs,background:c.surface,color:c.muted,cursor:'pointer',display:'grid',placeItems:'center'}}><${Icon} name=${c.d?'Sun':'Moon'} size=${16}/></button>
    </div>`;
  }

  renderToast(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;
    if(!this.state.toast) return null;
    return html`<div style=${{position:'absolute',bottom:'22px',left:'50%',transform:'translateX(-50%)',zIndex:60,background:this.state.dark?'#ECEEF0':'#16181C',color:this.state.dark?'#16181C':'#fff',padding:'10px 16px',borderRadius:'10px',fontSize:'13px',fontWeight:600,display:'flex',alignItems:'center',gap:'8px',boxShadow:'0 8px 24px rgba(8,10,12,.3)',animation:'mvFade .2s ease-out'}}>
      <${Icon} name="Check" size=${15} color=${c.teal.solid}/> ${this.state.toast}
    </div>`;
  }
}
</script>
</body>
</html>
