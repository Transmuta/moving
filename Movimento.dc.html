<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Martian+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0}
  @keyframes mvPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.62)}}
  @keyframes mvPulseRow{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes mvFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes mvScale{from{opacity:0;transform:scale(.975)}to{opacity:1;transform:none}}
  @keyframes mvSlide{from{transform:translateX(100%)}to{transform:translateX(0)}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(140,150,160,.32);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:rgba(140,150,160,.5)}
  ::-webkit-scrollbar-track{background:transparent}
  input,select,button,textarea{font-family:inherit}
  input:focus-visible,select:focus-visible,button:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:2px solid #0FB5A6;outline-offset:1px}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</helmet>
<div style="width:100%;height:100vh;overflow:hidden">{{ app }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props){
    super(props);
    // ---------- helpers ----------
    let s=987654321;
    const rnd=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
    const ri=(a,b)=>a+Math.floor(rnd()*(b-a+1));
    const pad=(n,l)=>String(n).padStart(l,'0');
    const cpf=()=>pad(ri(0,999),3)+'.'+pad(ri(0,999),3)+'.'+pad(ri(0,999),3)+'-'+pad(ri(0,99),2);
    const tel=()=>'(11) 9'+pad(ri(0,9999),4)+'-'+pad(ri(0,9999),4);

    // ---------- domain seed ----------
    const cat=['#E69F00','#0072B2','#009E73','#D55E00','#CC79A7','#56B4E9','#7A52CC'];
    const profs=[
      {id:'p1',nome:'Dra. Marina Lopes',sub:'Ortopedia',crefito:'CREFITO 3/123456-F',ci:1,ativo:true},
      {id:'p2',nome:'Dr. Rafael Couto',sub:'Neurofuncional',crefito:'CREFITO 3/098234-F',ci:2,ativo:true},
      {id:'p3',nome:'Dra. Beatriz Nunes',sub:'RPG',crefito:'CREFITO 3/145789-F',ci:3,ativo:true},
      {id:'p4',nome:'Dr. Thiago Alves',sub:'Esportiva',crefito:'CREFITO 3/167432-F',ci:4,ativo:true},
      {id:'p5',nome:'Dra. Carla Reis',sub:'Pilates',crefito:'CREFITO 3/178654-F',ci:5,ativo:true},
    ];
    const wd=['dom','seg','ter','qua','qui','sex','sáb'];
    // Profissionais seguem o horário da clínica por padrão (followClinic). avail guarda apenas exceções por dia da semana.
    profs.forEach(p=>{p.followClinic=true; p.avail={};});
    // Ex.: Dra. Beatriz segue integralmente o horário da clínica.
    // Ex.: Dr. Thiago tem horário próprio (personalizado), sempre dentro do horário da clínica: quarta só de manhã e não atende aos sábados.
    profs[3].followClinic=false;
    profs[3].avail={1:[['08:00','12:00'],['13:00','18:00']],2:[['08:00','12:00'],['13:00','18:00']],3:[['08:00','12:00']],4:[['08:00','12:00'],['13:00','18:00']],5:[['08:00','12:00'],['13:00','18:00']]};
    const types=[
      {id:'t1',nome:'Avaliação',dur:50,cor:'#0072B2',icon:'ClipboardList',grupo:false},
      {id:'t2',nome:'Sessão',dur:50,cor:'#0FB5A6',icon:'Activity',grupo:false},
      {id:'t3',nome:'RPG',dur:50,cor:'#009E73',icon:'StretchHorizontal',grupo:false},
      {id:'t4',nome:'Pilates',dur:50,cor:'#CC79A7',icon:'Users',grupo:true,cap:4},
      {id:'t5',nome:'Reavaliação',dur:30,cor:'#7A52CC',icon:'RefreshCw',grupo:false},
    ];
    const tagPool=['lombalgia','pós-op joelho','cervicalgia','tendinite','escoliose','pós-op ombro','LER/DORT','hérnia de disco','entorse tornozelo','fortalecimento','reabilitação esportiva','gestante'];
    const nomes=['Ana Beatriz Ferreira','Carlos Eduardo Ramos','Juliana Martins','Pedro Henrique Souza','Mariana Costa','Lucas Almeida','Fernanda Oliveira','Rafael Mendes','Camila Rocha','Bruno Carvalho','Larissa Pereira','Gustavo Lima','Patrícia Gomes','Rodrigo Barbosa','Vanessa Ribeiro','Felipe Cardoso','Aline Teixeira','Marcelo Pinto','Tatiane Araújo','Diego Nascimento','Sônia Castro','Eduardo Moraes','Beatriz Cunha','Henrique Dias'];
    const generos=['Masculino','Feminino','Outro'];
    const ecivis=['Solteiro(a)','Casado(a)','Divorciado(a)','Viúvo(a)'];
    const ruas=['Rua das Acácias','Av. Paulista','Rua Augusta','Rua Oscar Freire','Av. Brasil','Rua XV de Novembro','Rua das Flores','Av. Rebouças'];
    const bairros=['Centro','Jardins','Pinheiros','Vila Mariana','Moema','Tatuapé','Santana','Perdizes'];
    const cidades=['São Paulo','Guarulhos','Osasco','Santo André','São Bernardo'];
    const profissoes=['Professor(a)','Analista de sistemas','Vendedor(a)','Engenheiro(a)','Aposentado(a)','Autônomo(a)','Estudante','Administrador(a)','Designer','Motorista'];
    const empresas=['—','Itaú','Magazine Luiza','Bradesco','Ambev','Autônomo','—','Natura'];
    const parentescos=['Cônjuge','Mãe','Pai','Filho(a)','Irmão(ã)','Amigo(a)'];
    const convenios=['Unimed','Bradesco Saúde','SulAmérica','Amil','Porto Seguro'];
    const atendTipos=['particular','convenio','reembolso'];
    const comoPool=['Indicação Médica','Indicação de Amigos','Instagram','Google / Mapas','Outros'];
    const patients=nomes.map((nome,i)=>{
      const prefs=[profs[i%5].id]; if(i%4===0) prefs.push(profs[(i+2)%5].id);
      const t1=tagPool[i%tagPool.length], t2=tagPool[(i*3+2)%tagPool.length];
      const tags=t1===t2?[t1]:[t1,t2];
      const hasPkg=i%3===0;
      const tot=[6,10,10,8][i%4], used=ri(1,tot-1);
      const tipo=atendTipos[i%3];
      const conv=tipo==='convenio';
      return {
        id:'pac'+(i+1), nome, nomeSocial:'',
        cpf:cpf(), rg:pad(ri(10,49),2)+'.'+pad(ri(0,999),3)+'.'+pad(ri(0,999),3)+'-'+ri(0,9),
        genero:generos[i%3], estadoCivil:ecivis[i%4],
        nasc:pad(ri(1,28),2)+'/'+pad(ri(1,12),2)+'/'+ri(1962,2004),
        tel:tel(), email:nome.toLowerCase().normalize('NFD').replace(/[^a-z ]/g,'').split(' ').slice(0,2).join('.')+'@email.com',
        endereco:ruas[i%ruas.length], numero:String(ri(10,1990)), complemento:i%3===0?('Apto '+ri(11,142)):'', bairro:bairros[i%bairros.length], cidade:cidades[i%cidades.length], uf:'SP', cep:pad(ri(1,99),2)+pad(ri(100,999),3)+'-'+pad(ri(0,999),3),
        emNome:nomes[(i+5)%nomes.length], emParentesco:parentescos[i%parentescos.length], emTel:tel(),
        resp:i%7===0?'Maria Aparecida (mãe)':'',
        profissao:profissoes[i%profissoes.length], empresa:empresas[i%empresas.length],
        atendTipo:tipo, convenio:conv?convenios[i%convenios.length]:'', carteirinha:conv?pad(ri(0,999999999),9):'', validade:conv?('12/20'+ri(26,30)):'', medico:i%2===0?('Dr. '+nomes[(i+3)%nomes.length].split(' ')[0]+' '+nomes[(i+3)%nomes.length].split(' ').slice(-1)):'', crm:i%2===0?('CRM/SP '+ri(50000,189999)):'', comoConheceu:comoPool[i%comoPool.length],
        prefs, tags, faltas:0, pkg:hasPkg?{tipo:'Sessão',total:tot,usadas:used}:null,
        ci:ri(1,7), lgpd:true, comunicacao:i%5!==0,
      };
    });
    patients[4].faltas=2; patients[11].faltas=3; patients[18].faltas=1;

    // ---------- appointments for today ----------
    const today=new Date(2026,5,25); // Thu Jun 25 2026
    const ds=this.dstr(today);
    const NOW=702; // 11:42
    const appts=[];
    let aid=0;
    const profType={p1:['t1','t2','t5'],p2:['t2','t1','t5'],p3:['t3','t3','t2'],p4:['t2','t5','t1'],p5:['t4']};
    const starts=[480,540,600,660,780,840,900,960,1020];
    const pastPool=['concluido','confirmado','faltou','cancelado'];
    let pc=0;
    profs.forEach((pr,pi)=>{
      starts.forEach((st,si)=>{
        const tlist=profType[pr.id];
        const tid=tlist[si%tlist.length];
        const tp=types.find(t=>t.id===tid);
        const end=st+tp.dur;
        let status;
        if(end<=NOW) status=pastPool[(pi+si)%4];
        else if(st<=NOW&&end>NOW) status='em_atendimento';
        else status=(si%2===0)?'confirmado':'agendado';
        if(tp.grupo){
          const ppl=[]; const n=ri(2,4);
          for(let k=0;k<n;k++){ppl.push('pac'+(((pc++)%24)+1));}
          appts.push({id:'a'+(++aid),profId:pr.id,typeId:tid,start:st,dur:tp.dur,date:ds,status,patientIds:ppl,encaixe:false});
        } else {
          appts.push({id:'a'+(++aid),profId:pr.id,typeId:tid,start:st,dur:tp.dur,date:ds,status,patientId:'pac'+(((pc++)%24)+1),encaixe:false});
        }
      });
    });
    // encaixe (Marina 10:15, overlaps her 10:00)
    appts.push({id:'a'+(++aid),profId:'p1',typeId:'t5',start:615,dur:30,date:ds,status:'agendado',patientId:'pac7',encaixe:true});
    // conflict (Thiago second at 15:00)
    appts.push({id:'a'+(++aid),profId:'p4',typeId:'t1',start:900,dur:50,date:ds,status:'confirmado',patientId:'pac20',encaixe:false});

    // Fila: profIds = profissionais preferidos (pode ter mais de um). regras = disponibilidade (dias da semana e/ou datas específicas com faixa de horário).
    const fila=[
      {id:'f1',patientId:'pac12',prio:'urgente',profIds:['p1'],janela:'manhã',dias:8,obs:'Dor aguda lombar, encaminhada do ortopedista',regras:[{tipo:'semana',dows:[1,3],periodos:[['09:00','11:00'],['14:00','16:00']]},{tipo:'data',data:'2026-07-15',periodos:[['08:00','12:00']]}]},
      {id:'f2',patientId:'pac5',prio:'alta',profIds:['p4','p1'],janela:'tarde',dias:5,obs:'Retorno pós-op joelho',regras:[{tipo:'semana',dows:[2,4],periodos:[['15:00','17:00']]},{tipo:'data',data:'2026-06-20',periodos:[['09:00','11:00']]}]},
      {id:'f3',patientId:'pac9',prio:'normal',profIds:[],janela:'qualquer',dias:3,obs:'Flexível de horário',regras:[]},
      {id:'f4',patientId:'pac22',prio:'normal',profIds:['p3'],janela:'manhã',dias:2,obs:'Prefere início de semana',regras:[{tipo:'semana',dows:[1,2],periodos:[['08:00','12:00']]}]},
    ];
    const holidays=[
      {id:'h1',data:'2026-07-09',nome:'Revolução Constitucionalista',tipo:'fechado'},
      {id:'h2',data:'2026-07-24',nome:'Confraternização da equipe — expediente reduzido',tipo:'horario',periods:[['08:00','12:00']]},
    ];
    // Horário da clínica: cada dia é uma lista de períodos (permite mais de um período no mesmo dia). null = fechado.
    const hours={1:[['08:00','12:00'],['13:00','18:00']],2:[['08:00','12:00'],['13:00','18:00']],3:[['08:00','12:00'],['13:00','18:00']],4:[['08:00','12:00'],['13:00','18:00']],5:[['08:00','12:00'],['13:00','18:00']],6:[['08:00','12:00']],0:null};

    this.cat=cat; this.wd=wd;
    this.state={
      ready:false, screen:'agenda', dark:false, density:'espacoso',
      view:'dia', date:ds, drawer:null, modal:null, modalData:{}, selPaciente:null,
      profs, types, patients, appts, fila, holidays, hours,
      settings:{capPilates:4, noShowConsome:false, slot:15},
      w:1440, toast:null, drag:null, ghost:null, configTab:'operacao', filtroPac:'', pacQuery:'', pacFiltro:'todos', filaPrio:'todas', repPeriodo:'hoje', profFiltro:'todos',
    };

    // stable Icon component
    this.Icon=({name,size=16,color,strokeWidth=2,style})=>{
      const root=window.lucide; const node=root&&((root.icons&&root.icons[name])||root[name]);
      if(!node||!Array.isArray(node)||typeof node[0]!=='string') return React.createElement('span',{style:{display:'inline-block',width:size,height:size,flexShrink:0}});
      const mk=(it,i)=>{const kids=Array.isArray(it[2])?it[2].map(mk):null; return React.createElement(it[0],{key:i,...(it[1]||{})},kids);};
      const kids=Array.isArray(node[2])?node[2].map(mk):null;
      const attrs={...(node[1]||{}),width:size,height:size,fill:'none',stroke:color||'currentColor','stroke-width':strokeWidth,style:{flexShrink:0,display:'block',...(style||{})}};
      return React.createElement('svg',attrs,kids);
    };
    this._onKey=(e)=>{ if(e.key==='Escape'){ if(this.state.modal) this.setState({modal:null}); else if(this.state.drawer) this.setState({drawer:null}); } };
    this._onResize=()=>this.setState({w:window.innerWidth});
    this._gridRef=(el)=>{ if(!el){ this._gridEl=null; this._scrolled=false; return; } this._gridEl=el; if(!this._scrolled){ this._scrolled=true; setTimeout(()=>{ if(this._gridEl){ try{ this._gridEl.scrollTop=Math.max(0,(702-480)*this.ppm()-120); }catch(e){} } },160); } };
  }

  dstr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

  componentDidMount(){
    window.addEventListener('keydown',this._onKey);
    window.addEventListener('resize',this._onResize);
    this.setState({w:window.innerWidth});
    let tries=0;
    const tick=()=>{ if(window.htm&&window.lucide){ this.html=window.htm.bind(React.createElement); this.setState({ready:true}); } else if(tries++<120){ setTimeout(tick,40); } };
    tick();
  }
  componentWillUnmount(){ window.removeEventListener('keydown',this._onKey); window.removeEventListener('resize',this._onResize); clearTimeout(this._tt); }

  // ---------- theme ----------
  theme(){
    const d=this.state.dark;
    const teal={solid:'#0FB5A6',hover:'#0BA294',text:d?'#3FD6C7':'#0A7E73',subtle:d?'rgba(15,181,166,.16)':'#E5F7F4',border:d?'rgba(127,218,205,.45)':'#7FDACD'};
    return {
      d, teal,
      canvas:d?'#0C0D0E':'#FBFCFD', surface:d?'#16181C':'#FFFFFF', surface2:d?'#1C1F24':'#F6F8F9',
      rail:d?'#08090A':'#16181C', railItem:d?'#1A1D22':'#26292F',
      bs:d?'#24282E':'#E4E7EB', bd:d?'#313640':'#CDD3D9',
      text:d?'#ECEEF0':'#161A1E', muted:d?'#9AA3AC':'#5C6670', faint:d?'#6B747D':'#8A929B',
      primary:d?'#ECEEF0':'#16181C', primaryHover:d?'#FFFFFF':'#2A2E34', onPrimary:d?'#16181C':'#FFFFFF',
      success:'#2DA160', warning:'#F5A623', danger:'#E5484D', info:'#2B7FFF',
    };
  }
  tint(hex,a){ if(!hex)return 'transparent'; const h=hex.replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); return `rgba(${r},${g},${b},${a})`; }
  profColor(p){ const pr=typeof p==='string'?this.state.profs.find(x=>x.id===p):p; return this.cat[((pr?pr.ci:1)-1)%7]; }
  patientColor(p){ const pp=typeof p==='string'?this.patient(p):p; return this.cat[((((pp&&pp.ci)||1)-1)%7+7)%7]; }
  idadeDe(nasc){ const m=(nasc||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(!m) return ''; const b=new Date(+m[3],+m[2]-1,+m[1]); const now=new Date(2026,5,30); let a=now.getFullYear()-b.getFullYear(); if(now.getMonth()<b.getMonth()||(now.getMonth()===b.getMonth()&&now.getDate()<b.getDate()))a--; return (a>=0&&a<130)?a:''; }
  prefNomes(p){ return (p.prefs||[]).map(id=>{const pr=this.state.profs.find(x=>x.id===id);return pr?pr.nome:null;}).filter(Boolean); }
  convLabel(p){ return p.atendTipo==='convenio'?(p.convenio||'Convênio'):(p.atendTipo==='reembolso'?'Reembolso':'Particular'); }
  patient(id){ return this.state.patients.find(p=>p.id===id); }
  type(id){ return this.state.types.find(t=>t.id===id); }
  initials(nome){ const w=nome.replace(/Dra?\.\s*/,'').trim().split(/\s+/); return ((w[0]||'')[0]||'')+((w[w.length-1]||'')[0]||''); }
  m2t(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
  t2m(t){ const[a,b]=t.split(':').map(Number); return a*60+b; }

  statusMeta(s){
    const c=this.theme();
    const M={
      agendado:{label:'Agendado',color:c.muted,icon:'Circle',base:null},
      confirmado:{label:'Confirmado',color:c.info,icon:'CheckCheck',base:c.info},
      em_atendimento:{label:'Em atendimento',color:c.teal.solid,icon:'Radio',base:c.teal.solid,live:true},
      concluido:{label:'Concluído',color:c.success,icon:'Check',base:c.success,dim:true},
      faltou:{label:'Faltou',color:c.danger,icon:'UserX',base:c.danger},
      cancelado:{label:'Cancelado',color:c.faint,icon:'X',base:null,strike:true},
    };
    return M[s];
  }

  // ---------- computed ----------
  dayAppts(date){ return this.state.appts.filter(a=>a.date===(date||this.state.date)); }
  profAppts(pid,date){ return this.dayAppts(date).filter(a=>a.profId===pid).sort((a,b)=>a.start-b.start); }
  apptPatients(a){ return a.patientIds?a.patientIds.map(id=>this.patient(id)):[this.patient(a.patientId)]; }
  needsAction(a){ return this.state.date==='2026-06-25' && (a.start+a.dur)<=702 && (a.status==='agendado'||a.status==='confirmado'); }
  conflictOf(a){ // returns conflicting appt id or null
    if(a.encaixe||a.status==='cancelado') return null;
    const end=a.start+a.dur;
    return this.dayAppts(a.date).find(b=>b.id!==a.id && !b.encaixe && b.status!=='cancelado' && b.profId===a.profId && a.start<(b.start+b.dur) && b.start<end);
  }
  checkConflict(profId,start,dur,date,ignoreId,encaixe){
    if(encaixe) return null;
    const end=start+dur;
    return this.dayAppts(date).find(b=>b.id!==ignoreId && !b.encaixe && b.status!=='cancelado' && b.profId===profId && start<(b.start+b.dur) && b.start<end);
  }
  // Períodos efetivos do profissional em um dia da semana (considera "seguir a clínica" + exceções por dia).
  profWeek(prof,dow,hoursOverride){
    if(!prof) return null;
    const av=prof.avail||{};
    if(prof.followClinic!==false){
      if(Object.prototype.hasOwnProperty.call(av,dow)) return av[dow]; // exceção: array de períodos ou null (fechado)
      return (hoursOverride||this.state.hours)[dow]||null;
    }
    return av[dow]||null;
  }
  // Exceção de data específica (fecha o dia inteiro ou define horário específico).
  dateException(date){ return this.state.holidays.find(h=>h.data===date)||null; }
  // Períodos efetivos do profissional numa data (aplica exceção de data por cima do horário semanal).
  dayPeriods(prof,date,hoursOverride){
    const ex=this.dateException(date);
    if(ex) return ex.tipo==='horario'?(ex.periods||[]):null; // null = fechado
    return this.profWeek(prof,new Date(date+'T00:00').getDay(),hoursOverride);
  }
  // Agendamentos futuros que ficariam fora do expediente se o horário da clínica mudar para "draft".
  hourConflicts(draft){
    const today='2026-06-25';
    const fits=(ps,a)=>!!(ps&&ps.length&&ps.some(p=>a.start>=this.t2m(p[0])&&(a.start+a.dur)<=this.t2m(p[1])));
    const out=[];
    this.state.appts.forEach(a=>{
      if(['cancelado','concluido','faltou'].includes(a.status)) return;
      if(a.date<today) return; // só hoje em diante
      const prof=this.state.profs.find(p=>p.id===a.profId);
      if(!prof) return;
      const before=this.dayPeriods(prof,a.date,this.state.hours);
      const after=this.dayPeriods(prof,a.date,draft);
      // conflito apenas quando cabia no horário atual e deixa de caber no novo
      if(fits(before,a)&&!fits(after,a)){
        out.push({appt:a,prof,reason:(!after||!after.length)?'Dia fechado no novo horário':('Fora do novo expediente ('+(after||[]).map(p=>p[0]+'–'+p[1]).join(', ')+')')});
      }
    });
    return out.sort((x,y)=>x.appt.date<y.appt.date?-1:(x.appt.date>y.appt.date?1:x.appt.start-y.appt.start));
  }
  saveHours(){
    const draft=this.state.hoursDraft;
    if(!draft){ this.toast('Nenhuma alteração para salvar'); return; }

  checkAvail(profId,start,dur,date){
    const prof=this.state.profs.find(p=>p.id===profId);
    const end=start+dur;
    const ex=this.dateException(date);
    if(ex && ex.tipo!=='horario') return 'Data de exceção — clínica fechada ('+ex.nome+')';
    const periods=this.dayPeriods(prof,date);
    if(!periods||!periods.length) return ex?('Data de exceção — sem atendimento ('+ex.nome+')'):'Profissional não atende neste dia da semana';
    const fits=periods.some(p=>start>=this.t2m(p[0]) && end<=this.t2m(p[1]));
    if(!fits) return `Fora do expediente (${periods.map(p=>p[0]+'–'+p[1]).join(', ')})`;
    return null;
  }
  occupancy(date){
    const day=this.dayAppts(date).filter(a=>a.status!=='cancelado');
    const active=this.state.profs.filter(p=>p.ativo).length;
    const cap=active*(10-1)*60; // 8-18 minus lunch per prof, mins
    const used=day.reduce((s,a)=>s+a.dur*(a.patientIds?1:1),0);
    return Math.min(100,Math.round(used/cap*100));
  }
  profLoad(pid,date){
    const day=this.profAppts(pid,date).filter(a=>a.status!=='cancelado');
    const used=day.reduce((s,a)=>s+a.dur,0);
    return Math.min(100,Math.round(used/(9*60)*100));
  }
  reports(date){
    const day=this.dayAppts(date);
    const ativos=day.filter(a=>a.status!=='cancelado');
    const concl=day.filter(a=>a.status==='concluido').length;
    const falt=day.filter(a=>a.status==='faltou').length;
    const taxa=(concl+falt)>0?Math.round(falt/(concl+falt)*100):0;
    const porProf=this.state.profs.map(p=>{
      const pa=day.filter(a=>a.profId===p.id&&a.status!=='cancelado');
      const c=pa.filter(a=>a.status==='concluido').length;
      const f=pa.filter(a=>a.status==='faltou').length;
      return {prof:p,total:pa.length,concl:c,falt:f,taxa:(c+f)>0?Math.round(f/(c+f)*100):0};
    });
    return {total:ativos.length,concl,falt,taxa,porProf};
  }

  createSerie(d){

    const novos=occ.filter(o=>!o.feriado).map((o,i)=>({id:'a'+Date.now()+'-'+i,profId:d.profId,typeId:d.typeId,start:this.t2m(d.hora),dur:tp.dur,date:o.data,status:'agendado',patientId:d.patientId,encaixe:false}));

  computeSerie(d){
    const out=[]; const start=new Date(this.state.date+'T00:00');
    let cur=new Date(start); let count=0; let guard=0;
    const dows=d.dows;
    while(count<d.n && guard<400){
      guard++;
      cur.setDate(cur.getDate()+1);
      if(dows.includes(cur.getDay())){
        const ds=this.dstr(cur);
        const fer=this.state.holidays.some(h=>h.data===ds && h.tipo!=='horario');
        out.push({data:ds,feriado:fer, dow:cur.getDay()});
        if(!fer) count++;
      }
    }
    return out;
  }

  // ---------- drag ----------
  startDrag(e,a){
    if(e.button!==0) return;
    e.preventDefault();
    const grid=this._gridEl; if(!grid) return;
    const origCol=a.profId;
    const sx=e.clientX, sy=e.clientY; let moved=false;
    this.setState({drag:{id:a.id,origCol,origStart:a.start},ghost:{colId:origCol,start:a.start}});
    const onMove=(ev)=>{
      if(!moved&&(Math.abs(ev.clientX-sx)>4||Math.abs(ev.clientY-sy)>4)) moved=true;
      const cols=Array.from(grid.querySelectorAll('[data-col]'));
      let colId=origCol;
      for(const cEl of cols){ const r=cEl.getBoundingClientRect(); if(ev.clientX>=r.left&&ev.clientX<=r.right){ colId=cEl.getAttribute('data-col'); break; } }
      const body=grid.querySelector('[data-col="'+colId+'"] [data-body]')||grid.querySelector('[data-body]');
      const r=body.getBoundingClientRect();
      let mins=480+(ev.clientY-r.top)/this.ppm();
      mins=Math.max(480,Math.min(1080-a.dur,Math.round(mins/15)*15));
      this.setState({ghost:{colId,start:mins}});
    };
    const onUp=()=>{
      window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp);
      const g=this.state.ghost; const dr=this.state.drag;
      if(g&&dr&&(g.colId!==dr.origCol||g.start!==dr.origStart)){
        const ap=this.state.appts.find(x=>x.id===dr.id);
        const field='profId';
        const conf=this.checkConflict(g.colId,g.start,ap.dur,ap.date,ap.id,ap.encaixe);
        if(conf){ this.setState({drag:null,ghost:null}); this.openModal('override',{id:dr.id,field,colId:g.colId,start:g.start}); return; }
        this.commitMove(dr.id,field,g.colId,g.start); this.toast('Remarcado para '+this.m2t(g.start));
      }
      this.setState({drag:null,ghost:null});
      if(moved) this._afterDrag=Date.now();
    };
    window.addEventListener('pointermove',onMove); window.addEventListener('pointerup',onUp);
  }
  commitMove(id,field,colId,start){ this.setState(st=>({appts:st.appts.map(a=>a.id===id?{...a,[field]:colId,start}:a)})); }
  startPan(e){
    if(e.button!==0) return;
    if(e.target.closest('[data-appt]')||e.target.closest('button')||e.target.closest('input')) return;
    const grid=this._gridEl; if(!grid) return;
    const sx=e.clientX, sy=e.clientY; const sl=grid.scrollLeft, stp=grid.scrollTop; let moved=false;
    const onMove=(ev)=>{ const dx=ev.clientX-sx, dy=ev.clientY-sy; if(!moved&&(Math.abs(dx)>4||Math.abs(dy)>4)){ moved=true; grid.style.cursor='grabbing'; } if(moved){ grid.scrollLeft=sl-dx; grid.scrollTop=stp-dy; } };
    const onUp=()=>{ window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp); if(moved){ this._afterDrag=Date.now(); grid.style.cursor=''; } };
    window.addEventListener('pointermove',onMove); window.addEventListener('pointerup',onUp);
  }

  colAppts(col){
    const day=this.dayAppts(this.state.date);
    const list=day.filter(a=>a.profId===col.id);
    return list.sort((a,b)=>a.start-b.start);

  colLoad(col){ const used=this.colAppts(col).filter(a=>a.status!=='cancelado').reduce((s,a)=>s+a.dur,0); return Math.min(100,Math.round(used/(9*60)*100)); }
  layoutAppts(appts){
    const items=appts.map(a=>({id:a.id,start:a.start,end:a.start+a.dur})).sort((x,y)=>x.start-y.start||x.end-y.end);
    const byId={}; let maxLanes=1; let cluster=[]; let clusterEnd=-1;
    const flush=()=>{ if(!cluster.length) return; const laneEnds=[];
      cluster.forEach(it=>{ let lane=laneEnds.findIndex(e=>e<=it.start); if(lane===-1){ lane=laneEnds.length; laneEnds.push(it.end); } else laneEnds[lane]=it.end; it.lane=lane; });
      const lanes=laneEnds.length; cluster.forEach(it=>{ byId[it.id]={lane:it.lane,lanes}; }); maxLanes=Math.max(maxLanes,lanes); cluster=[]; clusterEnd=-1; };
    items.forEach(it=>{ if(cluster.length&&it.start>=clusterEnd) flush(); cluster.push(it); clusterEnd=Math.max(clusterEnd,it.end); });
    flush();
    return {byId,maxLanes};
  }
  _mountGrid(el,ppm){ this._gridEl=el; if(el&&!this._scrolled){ this._scrolled=true; requestAnimationFrame(()=>{ try{ el.scrollTop=Math.max(0,(702-480)*ppm-120); }catch(e){} }); } }

  emptyClick(e,col){
    if(this.state.drag) return;
    if(this._afterDrag&&Date.now()-this._afterDrag<300) return;

    let mins=480+(e.clientY-r.top)/this.ppm();
    mins=Math.max(480,Math.min(1065,Math.round(mins/15)*15));
    const pre={date:this.state.date,hora:this.m2t(mins)};
    pre.profId=col.id;
    this.openModal('novoAgendamento',pre);

  renderBlock(a,ppm,dragging,topOffset,slot){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;

    const grupo=!!a.patientIds;
    const fill=na?this.tint(c.warning,c.d?0.22:0.16):(m.base?this.tint(m.base,c.d?0.18:0.1):(c.d?c.surface2:c.surface));
    const border=conf?c.danger:(na?c.warning:(m.base?this.tint(m.base,c.d?.5:.4):c.bd));
    const lanes=(slot&&slot.lanes)||1; const lane=(slot&&slot.lane)||0;
    const g=3, pd=3;

      <div style=${{display:'flex',alignItems:'center',gap:'5px',position:'relative'}}>

        ${a.encaixe?html`<span style=${{fontSize:'9px',fontWeight:700,color:'#fff',background:c.warning,padding:'0 4px',borderRadius:'4px'}}>ENCAIXE</span>`:null}
      </div>
      ${h>30?html`<div style=${{fontSize:'12px',fontWeight:600,color:m.strike?c.faint:c.text,textDecoration:m.strike?'line-through':'none',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',position:'relative'}}>${grupo?(tp.nome+' · '+pats.length+'/'+(tp.cap||4)):pats[0].nome}</div>`:html`<div style=${{fontSize:'10.5px',color:m.strike?c.faint:c.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',textDecoration:m.strike?'line-through':'none'}}>${grupo?tp.nome:pats[0].nome}</div>`}

  fld(label,el){ const c=this.theme(); const html=this.html; return html`<label style=${{display:'block',marginBottom:'12px'}}><span style=${{display:'block',fontSize:'12px',fontWeight:600,color:c.muted,marginBottom:'5px'}}>${label}</span>${el}</label>`; }

  setMD(patch){ this.setState(st=>({modalData:{...st.modalData,...patch}})); }
  async lookupCep(cepRaw){
    const cep=(cepRaw||'').replace(/\D/g,'');
    if(cep.length!==8){ if(cep.length>0) this.setMD({cepStatus:null}); return; }
    this._cepReq=cep;
    this.setMD({cepStatus:'loading'});
    try{
      const r=await fetch('https://viacep.com.br/ws/'+cep+'/json/');
      const j=await r.json();
      if(this._cepReq!==cep) return; // usuário mudou o CEP no meio da consulta
      if(j.erro){ this.setMD({cepStatus:'notfound'}); return; }
      const patch={cepStatus:'ok'};
      if(j.logradouro) patch.endereco=j.logradouro;
      if(j.bairro) patch.bairro=j.bairro;
      if(j.localidade) patch.cidade=j.localidade;
      if(j.uf) patch.uf=j.uf;
      this.setMD(patch);
    }catch(e){ if(this._cepReq===cep) this.setMD({cepStatus:'error'}); }
  }
  maskCPF(v){ const d=(v||'').replace(/\D/g,'').slice(0,11); let o=d.slice(0,3); if(d.length>3)o+='.'+d.slice(3,6); if(d.length>6)o+='.'+d.slice(6,9); if(d.length>9)o+='-'+d.slice(9,11); return o; }
  maskRG(v){ const d=(v||'').toUpperCase().replace(/[^0-9X]/g,'').slice(0,9); let o=d.slice(0,2); if(d.length>2)o+='.'+d.slice(2,5); if(d.length>5)o+='.'+d.slice(5,8); if(d.length>8)o+='-'+d.slice(8,9); return o; }
  maskTel(v){ const d=(v||'').replace(/\D/g,'').slice(0,11); if(d.length===0)return ''; if(d.length<=2)return '('+d; let o='('+d.slice(0,2)+') '; const r=d.slice(2); if(r.length<=4)return o+r; if(d.length<=10){ o+=r.slice(0,4)+'-'+r.slice(4); } else { o+=r.slice(0,5)+'-'+r.slice(5); } return o; }
  maskCEP(v){ const d=(v||'').replace(/\D/g,'').slice(0,8); return d.length>5?d.slice(0,5)+'-'+d.slice(5):d; }
  maskDate(v){ const d=(v||'').replace(/\D/g,'').slice(0,8); let o=d.slice(0,2); if(d.length>2)o+='/'+d.slice(2,4); if(d.length>4)o+='/'+d.slice(4,8); return o; }
  maskMY(v){ const d=(v||'').replace(/\D/g,'').slice(0,6); let o=d.slice(0,2); if(d.length>2)o+='/'+d.slice(2,6); return o; }

    const c=this.theme(); const html=this.html; const Icon=this.Icon; const d=this.state.modalData; const sel=this.inputStyle(c);
    const ci=d.ci||1;
    const follow=d.followClinic!==false;
    const av=d.avail||{};
    const clinic=this.state.hours;
    const wds=[['Segunda',1],['Terça',2],['Quarta',3],['Quinta',4],['Sexta',5],['Sábado',6],['Domingo',0]];
    const setAvail=m=>this.setMD({avail:m});
    const updDay=(dow,fn)=>{ const m={...av}; const cur=Array.isArray(m[dow])?m[dow].map(p=>p.slice()):[]; m[dow]=fn(cur); setAvail(m); };
    const setP=(dow,pi,idx,v)=>updDay(dow,day=>{day[pi][idx]=v; return day;});
    const addP=(dow)=>updDay(dow,day=>{const cl=this.state.hours[dow]||[]; const last=day.length?day[day.length-1][1]:(cl[0]?cl[0][0]:'13:00'); const end=cl.length?cl[cl.length-1][1]:'18:00'; day.push([last,end]); return day;});
    const rmP=(dow,pi)=>updDay(dow,day=>{day.splice(pi,1); return day;});
    const fmt=ps=>(ps||[]).map(p=>p[0]+'–'+p[1]).join(', ');
    // No modo personalizado cada período do profissional deve caber inteiramente dentro de um período da clínica no mesmo dia.
    const dayValid=(dow)=>{ const day=av[dow]; if(!Array.isArray(day)||!day.length) return true; const cl=clinic[dow]; if(!cl||!cl.length) return false; return day.every(p=>this.t2m(p[0])<this.t2m(p[1]) && cl.some(cp=>this.t2m(cp[0])<=this.t2m(p[0]) && this.t2m(p[1])<=this.t2m(cp[1]))); };
    const invalidDays=follow?[]:[1,2,3,4,5,6,0].filter(dow=>Array.isArray(av[dow])&&av[dow].length&&!dayValid(dow));
    const hasInvalid=invalidDays.length>0;
    const toggleOwn=(dow,on)=>{ const m={...av}; if(on){ const cl=clinic[dow]; if(!cl||!cl.length) return; m[dow]=(Array.isArray(av[dow])&&av[dow].length?av[dow]:cl.map(p=>p.slice())); } else delete m[dow]; setAvail(m); };
    const dayRow=([lbl,dow])=>{
      const cl=clinic[dow]; const clinicOpen=!!(cl&&cl.length);
      const day=Array.isArray(av[dow])?av[dow]:null; const on=!!(day&&day.length);
      const bad=on&&!dayValid(dow);
      const minT=clinicOpen?cl[0][0]:undefined; const maxT=clinicOpen?cl[cl.length-1][1]:undefined;
      return html`<div key=${dow} style=${{display:'flex',alignItems:'flex-start',gap:'10px',padding:'9px 10px',borderTop:'1px solid '+c.bs,background:on?'transparent':c.surface2}}>
        <div style=${{display:'flex',alignItems:'center',gap:'8px',width:'120px',flexShrink:0,paddingTop:'3px'}}>${this.switchToggle(c,on,()=>toggleOwn(dow,!on),!clinicOpen)}<span style=${{fontSize:'12.5px',fontWeight:600,color:clinicOpen?c.text:c.faint}}>${lbl}</span></div>
        <div style=${{flex:1,minWidth:0}}>
          ${!clinicOpen?html`<span style=${{fontSize:'12px',color:c.faint,lineHeight:'30px'}}>Clínica fechada</span>`
            :on?html`${this.periodEditor(c,day,{set:(pi,idx,v)=>setP(dow,pi,idx,v),add:()=>addP(dow),rm:pi=>rmP(dow,pi),min:minT,max:maxT})}<div style=${{fontSize:'10.5px',marginTop:'4px',fontFamily:"'Martian Mono', monospace",color:bad?c.danger:c.faint}}>${bad?'Deve ficar dentro do horário da clínica ('+fmt(cl)+')':'Clínica: '+fmt(cl)}</div>`
            :html`<span style=${{fontSize:'12px',color:c.faint,lineHeight:'30px'}}>Não atende</span>`}
        </div>
      </div>`;
    };
    const body=html`<div>
      ${this.fld('Nome',html`<input value=${d.nome||''} onChange=${e=>this.setMD({nome:e.target.value})} placeholder="Dra. Nome Sobrenome" style=${sel}/>`)}
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
        ${this.fld('CREFITO',html`<input value=${d.crefito||''} onChange=${e=>this.setMD({crefito:e.target.value})} placeholder="CREFITO 3/000000-F" style=${{...sel,fontFamily:"'Martian Mono', monospace"}}/>`)}
        ${this.fld('Subárea',html`<input value=${d.sub||''} onChange=${e=>this.setMD({sub:e.target.value})} placeholder="Ortopedia" style=${sel}/>`)}
      </div>
      ${this.fld('Status',html`<select value=${d.ativo===false?'inativo':'ativo'} onChange=${e=>this.setMD({ativo:e.target.value==='ativo'})} style=${sel}><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select>`)}
      ${this.fld('Cor',html`<div style=${{display:'flex',gap:'8px'}}>${this.cat.map((col,i)=>html`<button key=${i} onClick=${()=>this.setMD({ci:i+1})} style=${{width:'34px',height:'34px',borderRadius:'8px',background:col,border:ci===i+1?'3px solid '+c.text:'3px solid transparent',cursor:'pointer'}}></button>`)}</div>`)}
      <div style=${{margin:'4px 0 6px'}}><span style=${{fontSize:'12px',fontWeight:600,color:c.muted}}>Horário de atendimento</span></div>
      <div style=${{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',borderRadius:'9px',border:'1px solid '+(follow?c.teal.solid:c.bd),background:follow?c.teal.subtle:c.surface,marginBottom:'8px'}}>
        ${this.switchToggle(c,follow,()=>this.setMD({followClinic:!follow}))}
        <div><div style=${{fontSize:'13px',fontWeight:600}}>Seguir o horário da clínica</div><div style=${{fontSize:'11.5px',color:c.muted}}>${follow?'O profissional atende exatamente no horário da clínica.':'Defina o horário do profissional — sempre dentro do horário de funcionamento da clínica.'}</div></div>
      </div>
      ${follow?'':html`<div style=${{border:'1px solid '+c.bs,borderRadius:'8px',overflow:'hidden'}}>
        ${wds.map(dayRow)}
      </div>${hasInvalid?html`<div style=${{marginTop:'8px',padding:'8px 11px',borderRadius:'8px',background:this.tint(c.danger,.1),color:c.danger,fontSize:'11.5px',fontWeight:600,display:'flex',alignItems:'center',gap:'7px'}}><${Icon} name="TriangleAlert" size=${14}/> Há horários fora do funcionamento da clínica. Ajuste antes de salvar.</div>`:''}`}
    </div>`;
    const footer=html`${this.btnS('Cancelar',()=>this.closeModal())}${this.btnP('Salvar',()=>this.saveProf({id:d.id,nome:d.nome,crefito:d.crefito,sub:d.sub,ci,ativo:d.ativo!==false,followClinic:follow,avail:av}),!d.nome||hasInvalid)}`;
    return this.modalShell(d.id?'Editar profissional':'Novo profissional',body,footer,'560px');
  }

  prioMeta(p){ const m={urgente:{label:'Urgente',color:'#E5484D'},alta:{label:'Alta',color:'#F5A623'},normal:{label:'Normal',color:'#2B7FFF'},baixa:{label:'Baixa',color:'#AEB6BE'}}; return m[p]; }
  // ---- disponibilidade da fila ----
  wdShort(d){ return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d]; }
  filaProfIds(f){ return f.profIds||(f.profId?[f.profId]:[]); }
  filaRegraExpirada(r){ return r.tipo==='data' && !!r.data && r.data<'2026-06-25'; }
  filaRegraPeriodos(r){ return r.periodos||(r.ini?[[r.ini,r.fim]]:[]); }
  filaRegraPrefix(r){ if(r.tipo==='data'){ if(!r.data) return '—'; const dd=new Date(r.data+'T00:00'); return dd.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); } return (r.dows||[]).slice().sort((a,b)=>a-b).map(d=>this.wdShort(d)).join('/'); }
  filaRegraLabel(r){
    const hh=this.filaRegraPeriodos(r).map(p=>p[0]+'–'+p[1]).join(', ');
    if(r.tipo==='data'){ if(!r.data) return '—'; const dd=new Date(r.data+'T00:00'); return dd.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' · '+hh; }
    return (r.dows||[]).slice().sort((a,b)=>a-b).map(d=>this.wdShort(d)).join('/')+' · '+hh;
  }
  // Gera regras semanais a partir da agenda cadastrada do profissional (agrupa dias com o mesmo horário).
  profDefaultRegras(profId){
    const prof=this.state.profs.find(p=>p.id===profId); if(!prof) return [];
    const groups={};
    [1,2,3,4,5,6].forEach(dow=>{ const ps=this.profWeek(prof,dow)||[]; if(!ps.length) return; const sig=ps.map(p=>p[0]+'-'+p[1]).join('|'); if(!groups[sig]) groups[sig]={dows:[],periodos:ps.map(p=>p.slice())}; groups[sig].dows.push(dow); });
    return Object.keys(groups).map(sig=>({tipo:'semana',dows:groups[sig].dows,periodos:groups[sig].periodos}));
  }

  // Editor reutilizável de períodos (lista de [início,fim]); permite mais de um período no mesmo dia. h.min/h.max limitam os horários.

  cfgHorario(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;

    const dirty=!!this.state.hoursDraft;
    const H=this.state.hoursDraft||this.state.hours;

    const setP=(d,pi,idx,val)=>upd(d,day=>{day[pi][idx]=val; return day;});

        <button onClick=${add} disabled=${!d.fdata} style=${{padding:'8px 14px',borderRadius:'8px',border:'none',background:d.fdata?c.primary:c.bd,color:c.onPrimary,fontWeight:600,cursor:d.fdata?'pointer':'default',fontSize:'13px'}}>Adicionar exceção</button>
      </div>
      ${this.state.holidays.slice().sort((a,b)=>a.data<b.data?-1:1).map(h=>{const dd=new Date(h.data+'T00:00'); const isH=h.tipo==='horario';
      return html`<div key=${h.id} style=${{display:'flex',alignItems:'center',gap:'11px',padding:'10px 0',borderTop:'1px solid '+c.bs}}>
        <${Icon} name=${isH?'Clock':'CalendarOff'} size=${16} color=${isH?c.teal.solid:c.danger}/>
        <span style=${{fontFamily:"'Martian Mono', monospace",fontSize:'11.5px',width:'92px'}}>${dd.toLocaleDateString('pt-BR')}</span>
        <div style=${{flex:1,minWidth:0}}>
          <div style=${{fontSize:'13.5px',fontWeight:500}}>${h.nome}</div>
          <div style=${{fontSize:'10.5px',fontFamily:"'Martian Mono', monospace",color:isH?c.teal.text:c.danger,marginTop:'1px'}}>${isH?(h.periods||[]).map(p=>p[0]+'–'+p[1]).join(', '):'Fechado o dia inteiro'}</div>
        </div>
        <button onClick=${()=>this.rmHoliday(h.id)} style=${this.iconBtn(c)}><${Icon} name="Trash2" size=${14} color=${c.danger}/></button>
      </div>`;})}
    </div>`);
  }

  // ================= RELATÓRIOS =================
  renderRelatorios(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;
    const r=this.reports(this.state.date);
    const kpi=(label,val,sub,color,icon)=>html`<div style=${{flex:'1 1 160px',padding:'15px 16px',borderRadius:'12px',border:'1px solid '+c.bs,background:c.surface}}>
      <div style=${{display:'flex',alignItems:'center',gap:'7px',color:c.muted,fontSize:'12px',marginBottom:'8px'}}><${Icon} name=${icon} size=${15} color=${color}/> ${label}</div>
      <div style=${{fontFamily:"'Martian Mono', monospace",fontSize:'25px',fontWeight:600,color:color||c.text,fontVariantNumeric:'tabular-nums'}}>${val}</div>
      <div style=${{fontSize:'11.5px',color:c.faint,marginTop:'2px'}}>${sub}</div>
    </div>`;
    return html`<div style=${{padding:'16px 18px',maxWidth:'900px'}}>
      <div style=${{fontSize:'13px',color:c.muted,marginBottom:'14px'}}>Visão de hoje · ${new Date(this.state.date+'T00:00').toLocaleDateString('pt-BR')}</div>
      <div style=${{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'18px'}}>
        ${kpi('Atendimentos',r.total,'agendados hoje',null,'CalendarDays')}
        ${kpi('Concluídos',r.concl,'realizados',c.success,'CheckCircle2')}
        ${kpi('Faltas',r.falt,'no-shows',c.danger,'UserX')}
        ${kpi('Taxa de falta',r.taxa+'%','sobre realizados',r.taxa>20?c.danger:c.warning,'TrendingDown')}
      </div>
      <div style=${{border:'1px solid '+c.bs,borderRadius:'12px',overflow:'hidden',background:c.surface}}>
        <div style=${{padding:'12px 16px',borderBottom:'1px solid '+c.bs,fontWeight:600,fontSize:'14px'}}>Desempenho por profissional</div>
        ${r.porProf.map(pp=>html`<div key=${pp.prof.id} style=${{display:'flex',alignItems:'center',gap:'14px',padding:'12px 16px',borderBottom:'1px solid '+c.bs}}>
          ${this.avatar(pp.prof.nome,this.profColor(pp.prof),30)}
          <div style=${{width:'150px',minWidth:0}}><div style=${{fontWeight:600,fontSize:'13px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>${pp.prof.nome}</div><div style=${{fontSize:'11px',color:c.faint}}>${pp.prof.sub}</div></div>
          <div style=${{flex:1}}>
            <div style=${{display:'flex',justifyContent:'space-between',fontSize:'11px',color:c.muted,marginBottom:'3px'}}><span>Volume · ${pp.total}</span><span>Falta ${pp.taxa}%</span></div>
            <div style=${{display:'flex',gap:'6px',alignItems:'center'}}>
              <div style=${{flex:1,height:'8px',borderRadius:'5px',background:c.surface2,overflow:'hidden'}}><div style=${{width:Math.min(100,pp.total/12*100)+'%',height:'100%',background:this.profColor(pp.prof),opacity:.85}}></div></div>
              <div style=${{width:'56px',height:'8px',borderRadius:'5px',background:c.surface2,overflow:'hidden'}}><div style=${{width:pp.taxa+'%',height:'100%',background:pp.taxa>20?c.danger:c.warning}}></div></div>
            </div>
          </div>
          <div style=${{fontFamily:"'Martian Mono', monospace",fontSize:'11px',color:c.muted,width:'90px',textAlign:'right'}}>${pp.concl}✓ · ${pp.falt}✕</div>
        </div>`)}
      </div>
    </div>`;
  }

  // ================= LOGIN =================
  renderLogin(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;
    return html`<div style=${{height:'100vh',width:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:c.canvas,fontFamily:"'Hanken Grotesk', sans-serif",color:c.text,position:'relative',overflow:'hidden'}}>
      <div style=${{position:'absolute',top:0,left:0,right:0,height:'3px',background:c.teal.solid}}></div>
      <div style=${{width:'380px',maxWidth:'92vw',padding:'34px 30px',borderRadius:'14px',border:'1px solid '+c.bs,background:c.surface,boxShadow:c.d?'none':'0 12px 40px rgba(20,24,30,.08)',animation:'mvScale .25s ease-out'}}>
        <div style=${{display:'flex',alignItems:'center',gap:'10px',marginBottom:'24px'}}>
          <div style=${{width:'36px',height:'36px',borderRadius:'9px',background:c.teal.solid,display:'grid',placeItems:'center'}}><${Icon} name="Activity" size=${21} color="#fff" strokeWidth=${2.4}/></div>
          <div style=${{fontWeight:800,fontSize:'20px',letterSpacing:'-.02em'}}>Movimento</div>
        </div>
        <div style=${{fontWeight:700,fontSize:'17px',marginBottom:'4px'}}>Entrar na clínica</div>
        <div style=${{fontSize:'13px',color:c.muted,marginBottom:'20px'}}>O sistema que enche a sua agenda.</div>
        ${this.fld('E-mail',html`<input defaultValue="recepcao@movimento.com.br" style=${this.inputStyle(c)}/>`)}
        ${this.fld('Senha',html`<input type="password" defaultValue="••••••••" style=${this.inputStyle(c)}/>`)}
        <button onClick=${()=>this.go('agenda')} style=${{width:'100%',padding:'11px',borderRadius:'8px',border:'none',background:c.primary,color:c.onPrimary,fontWeight:700,fontSize:'14px',cursor:'pointer',marginTop:'6px'}}>Entrar</button>
        <div style=${{textAlign:'center',marginTop:'14px',fontSize:'12.5px',color:c.faint}}>Esqueceu a senha? <span style=${{color:c.teal.text,fontWeight:600,cursor:'pointer'}}>Recuperar</span></div>
      </div>
      <button onClick=${()=>this.setState({dark:!this.state.dark})} style=${{position:'absolute',bottom:'18px',right:'18px',width:'36px',height:'36px',borderRadius:'8px',border:'1px solid '+c.bs,background:c.surface,color:c.muted,cursor:'pointer',display:'grid',placeItems:'center'}}><${Icon} name=${c.d?'Sun':'Moon'} size=${16}/></button>
    </div>`;
  }

  renderToast(){
    const c=this.theme(); const html=this.html; const Icon=this.Icon;
    if(!this.state.toast) return null;
    return html`<div style=${{position:'absolute',bottom:'22px',left:'50%',transform:'translateX(-50%)',zIndex:60,background:this.state.dark?'#ECEEF0':'#16181C',color:this.state.dark?'#16181C':'#fff',padding:'10px 16px',borderRadius:'10px',fontSize:'13px',fontWeight:600,display:'flex',alignItems:'center',gap:'8px',boxShadow:'0 8px 24px rgba(8,10,12,.3)',animation:'mvFade .2s ease-out'}}>
      <${Icon} name="Check" size=${15} color=${c.teal.solid}/> ${this.state.toast}
    </div>`;
  }
}
</script>
</body>
</html>
