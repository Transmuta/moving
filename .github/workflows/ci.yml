name: CI

on:
  push:
    branches: [main]
  pull_request:

# Um run por branch/PR; cancela os anteriores ainda rodando.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — testes + cobertura (mínimo 80%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
      DATABASE_HOST: localhost
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.4"
          otp-version: "27"

      - name: Cache deps e _build
        uses: actions/cache@v4
        with:
          path: |
            api/deps
            api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('api/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get

      # Espelha o alias `precommit`: formatação e zero-warnings barram o merge.
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors

      - name: Preparar banco (migrations Ash)
        run: mix ash.setup --quiet

      # `mix coveralls` roda a suíte e FALHA abaixo do minimum_coverage (coveralls.json).
      - name: Testes + gate de cobertura
        run: mix coveralls

  web:
    name: Web — svelte-check + unit/integração (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run check
      # test unit/integração + gate de cobertura (thresholds em vite.config.ts).
      - run: npm run coverage
      - run: npm run build

  web-e2e:
    name: Web — e2e (Playwright, cenários críticos)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - name: Instalar browser + libs de sistema (chromium)
        run: npx playwright install --with-deps chromium

      # A config do Playwright sobe o app (build + preview) sozinha via `webServer`.
      - run: npm run test:e2e

      - name: Publicar relatório em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7
